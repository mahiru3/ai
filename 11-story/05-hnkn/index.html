<!DOCTYPE html>
<!-- 11-story/05-hnkn/index.html -->
<!-- PDFテキスト化ツール：PDFを読み込み、テキストとして出力する -->
<!-- 2段組対応（本文モード／注釈モード）、図・イラストは排除 -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDFテキスト化</title>
  <link rel="stylesheet" href="../../01-css/11-story-05-hnkn.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<h1>📄 PDFテキスト化したい</h1>

<!-- ドロップゾーン -->
<div id="dropZone">
  <p>PDFをここにドロップ</p>
  <p>または</p>
  <label for="fileInput" id="fileLabel">📂 ファイルを選択</label>
  <input type="file" id="fileInput" accept=".pdf">
</div>

<div id="status"></div>

<!-- 出力エリア -->
<div id="outputWrap">
  <div class="btn-row">
    <button id="copyBtn" disabled>📋 コピー</button>
    <button id="dlBtn" disabled>💾 ダウンロード</button>
    <button id="clearBtn" disabled>🗑 クリア</button>
  </div>
  <textarea id="output" readonly placeholder="ここにテキストが出力されます"></textarea>
</div>

<script>
  // pdf.js ワーカー設定
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // navi.html から受け取る設定
  let cfg = {
    mode: 'double',
    splitRatio: null,    // null=自動検出, 0〜1=手動指定
    annotIndent: '　',
    annotBracket: false,
    pageBreak: false,
    pageBreakStr: '----------',
  };

  // 読み込み済みPDFを保持（再処理用）
  let loadedPdf = null;

  window.addEventListener('message', async e => {
    if (e.data && e.data.type === 'hnknCfg') {
      cfg = Object.assign(cfg, e.data.cfg);
      // 適用時にPDFが読み込み済みなら再処理
      if (loadedPdf) {
        await runExtract(loadedPdf);
      }
    }
  });

  // ─── ドロップ・ファイル選択 ───────────────────────
  const dropZone  = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') processPdf(file);
    else setStatus('PDFファイルを選択してください', true);
  });
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) processPdf(file);
  });

  // ─── PDF処理メイン ────────────────────────────────
  async function processPdf(file) {
    setStatus('読み込み中…');
    disableButtons();
    try {
      const arrayBuffer = await file.arrayBuffer();
      loadedPdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      await runExtract(loadedPdf);
    } catch (err) {
      setStatus('エラー: ' + err.message, true);
      console.error(err);
    }
  }

  // ─── テキスト抽出実行（再処理にも使う） ──────────
  async function runExtract(pdf) {
    disableButtons();
    const pageCount = pdf.numPages;
    const allLines = [];
    try {
      for (let p = 1; p <= pageCount; p++) {
        setStatus(`処理中… ${p} / ${pageCount} ページ`);
        const page     = await pdf.getPage(p);
        const content  = await page.getTextContent();
        const viewport = page.getViewport({ scale: 1 });
        const lines = extractLines(content.items, viewport.width, viewport.height);
        allLines.push(...lines);
        if (cfg.pageBreak && p < pageCount) allLines.push(cfg.pageBreakStr);
      }
      document.getElementById('output').value = allLines.join('\n');
      enableButtons();
      setStatus(`完了 ✅  ${pageCount}ページ処理しました`);
    } catch (err) {
      setStatus('エラー: ' + err.message, true);
      console.error(err);
    }
  }

  function disableButtons() {
    ['copyBtn','dlBtn','clearBtn'].forEach(id => document.getElementById(id).disabled = true);
  }
  function enableButtons() {
    ['copyBtn','dlBtn','clearBtn'].forEach(id => document.getElementById(id).disabled = false);
  }

  // ─── テキスト抽出・2段組処理 ─────────────────────
  function extractLines(items, pageWidth, pageHeight) {

    // 空文字・transformなしを除外
    const textItems = items.filter(item =>
      item.str.trim() !== '' && item.transform
    );
    if (textItems.length === 0) return [];

    // ヘッダー・フッター除去（ページ上端5%・下端8%）
    const topEdge    = pageHeight * 0.92;
    const bottomEdge = pageHeight * 0.08;
    const body = textItems.filter(i => {
      const y = i.transform[5];
      return y < topEdge && y > bottomEdge;
    });
    if (body.length === 0) return [];

    if (cfg.mode === 'single') {
      return mergeToLines(body);

    } else if (cfg.mode === 'double') {
      // X座標の最大ギャップを自動検出してsplitXを決める
      const autoSplitX = detectSplitX(body, pageWidth);
      const left  = body.filter(i => i.transform[4] < autoSplitX);
      const right = body.filter(i => i.transform[4] >= autoSplitX);
      return [...mergeToLines(left), ...mergeToLines(right)];

    } else if (cfg.mode === 'annot') {
      const autoSplitX = detectSplitX(body, pageWidth);
      const left  = body.filter(i => i.transform[4] < autoSplitX);
      const right = body.filter(i => i.transform[4] >= autoSplitX);
      return mergeWithAnnotation(left, right);
    }

    return mergeToLines(body);
  }

  // X座標の分布からsplitXを自動検出する
  // cfg.splitRatioが手動指定されている場合はそちらを優先
  function detectSplitX(items, pageWidth) {
    if (cfg.splitRatio !== null) {
      return pageWidth * cfg.splitRatio;
    }
    // 左半分（5%〜50%）の最大ギャップを境界とする
    const xs = items.map(i => i.transform[4]).sort((a, b) => a - b);
    const half = pageWidth * 0.5;
    let maxGap = 0, splitX = pageWidth * 0.5;
    for (let i = 1; i < xs.length; i++) {
      const gap = xs[i] - xs[i - 1];
      const mid = (xs[i - 1] + xs[i]) / 2;
      if (gap > maxGap && mid > pageWidth * 0.05 && mid < half) {
        maxGap = gap;
        splitX = mid;
      }
    }
    return splitX;
  }

  // テキストアイテムをY座標でソートして行単位にまとめる
  function mergeToLines(items) {
    if (items.length === 0) return [];

    const sorted = [...items].sort((a, b) => {
      const ya = a.transform[5], yb = b.transform[5];
      if (Math.abs(ya - yb) > 3) return yb - ya;
      return a.transform[4] - b.transform[4];
    });

    const lines = [];
    let curY = null, curLine = '';
    const Y_THRESH = 3;

    for (const item of sorted) {
      const y = item.transform[5];
      if (curY === null) {
        curY = y; curLine = item.str;
      } else if (Math.abs(y - curY) <= Y_THRESH) {
        curLine += item.str;
      } else {
        if (curLine.trim()) lines.push(curLine.trim());
        curY = y; curLine = item.str;
      }
    }
    if (curLine.trim()) lines.push(curLine.trim());
    return lines;
  }

  // 注釈モード：左段落の直後に対応Y位置の右テキストを挿入
  function mergeWithAnnotation(leftItems, rightItems) {
    const leftLines  = groupByParagraph(leftItems);
    const rightLines = groupByParagraph(rightItems);
    const result = [];

    for (const lp of leftLines) {
      result.push(lp.text);
      // 対応する注釈を探す（Y座標が重なるもの）
      const matched = rightLines.filter(rp =>
        rp.yMax >= lp.yMin && rp.yMin <= lp.yMax
      );
      for (const rp of matched) {
        const annotText = cfg.annotBracket
          ? `${cfg.annotIndent}（${rp.text}）`
          : `${cfg.annotIndent}${rp.text}`;
        result.push(annotText);
      }
    }
    return result;
  }

  // テキストアイテムを段落単位にグループ化（Y範囲付き）
  function groupByParagraph(items) {
    if (items.length === 0) return [];
    const LINE_GAP = 20; // この差以上で段落区切り
    const paragraphs = [];
    let group = [items[0]];

    for (let i = 1; i < items.length; i++) {
      const prevY = items[i - 1].transform[5];
      const currY = items[i].transform[5];
      if (Math.abs(prevY - currY) > LINE_GAP) {
        paragraphs.push(group);
        group = [];
      }
      group.push(items[i]);
    }
    paragraphs.push(group);

    return paragraphs.map(g => {
      const ys   = g.map(i => i.transform[5]);
      const text = mergeToLines(g).join('\n');
      return {
        text,
        yMin: Math.min(...ys),
        yMax: Math.max(...ys),
      };
    });
  }

  // ─── ボタン操作 ───────────────────────────────────
  document.getElementById('copyBtn').addEventListener('click', () => {
    const val = document.getElementById('output').value;
    navigator.clipboard.writeText(val).then(() => {
      setStatus('クリップボードにコピーしました 📋');
    });
  });

  document.getElementById('dlBtn').addEventListener('click', () => {
    const val = document.getElementById('output').value;
    if (!val) return;
    const blob = new Blob([val], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `pdf_text_${Date.now()}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setStatus('ダウンロード開始 💾');
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('output').value = '';
    loadedPdf = null;
    disableButtons();
    document.getElementById('fileInput').value = '';
    setStatus('');
  });

  function setStatus(msg, isError = false) {
    const el = document.getElementById('status');
    el.textContent  = msg;
    el.style.color  = isError ? '#f66' : '#aaa';
  }
</script>
</body>
</html>
