<body>

  <div class="menu">
    <!-- トップ：中央だけ切替（左は維持） -->
    <a href="00-main.html" target="center">トップ（00-main.html）</a>

    <!-- ▼ ここから「左＋中央 同時切替」リンク -->
    <!-- chara -->
    <a class="dual-link"
       href="31-csv/01-chara/index.html"
       data-center="31-csv/01-chara/index.html"

    <!-- 文字分割 -->

       href="31-csv/02-txt.bun/index.html"

    <!-- 黒板 -->

        <!-- 文章変換 -->
    <a class="dual-link"
       href="31-csv/06-hnkn/index.html"

       data-left="31-csv/06-hnkn/navi.html"
       target="center">✖文章変換✖</a>

    <!-- ▲ 追加する場合は、上の dual-link をコピペして data-left/data-center を変えるだけ -->
  </div>
<!--
dual-link:
クリック1回で
・left iframe
・center iframe
を同時に切り替える

トップはcenterのみ切替
-->
  <script>
    document.addEventListener("click", (e) => {
      const a = e.target.closest("a.dual-link");
      if (!a) return;

      const leftUrl = a.dataset.left;
      const centerUrl = a.dataset.center;
      if (!leftUrl || !centerUrl) return;

      // JSで同時切替するので通常遷移は止める
      e.preventDefault();

      // 左と中央を同時に切り替え
      if (parent && parent.frames) {
        if (parent.frames["left"]) parent.frames["left"].location.href = leftUrl;
        if (parent.frames["center"]) parent.frames["center"].location.href = centerUrl;
      }
    });
  </script>
</body>
</html>
