  <p class="note">
    ※ dual-link：left + center を同時切替<br>
    ※ トップは center のみ切替
  </p>

  <script>
    document.addEventListener("click", (e) => {
      const a = e.target.closest("a.dual-link");
      if (!a) return;
      const leftUrl = a.dataset.left;
      const centerUrl = a.dataset.center;
      if (!leftUrl || !centerUrl) return;
      e.preventDefault();
      if (parent && parent.frames) {
        if (parent.frames["left"])   parent.frames["left"].location.href = leftUrl;
        if (parent.frames["center"]) parent.frames["center"].location.href = centerUrl;
      }
    });
  </script>
