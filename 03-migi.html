<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>目次（右）</title>
  <link rel="stylesheet" href="01-css/00-style.css" />
  <link rel="stylesheet" href="01-css/03-migi.css" />
  <style>
    body { margin: 0; padding: 10px; font-family: sans-serif; font-size: 14px; }
    h3 { margin: 0 0 8px; font-size: 14px; }

    /* ── 通常メニューリンク ── */
    .menu a {
      display: block;
      padding: 7px 10px;
      margin: 5px 0;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      color: #222;
      text-decoration: none;
    }
    .menu a:hover { background: #f3f7ff; border-color: #bcd3ff; }

    /* ── アコーディオン ── */
    .acc {
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }
    .acc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      background: #f5f5f5;
      cursor: pointer;
      user-select: none;
      font-weight: 600;
      font-size: 13px;
    }
    .acc-header::after {
      content: "▶";
      font-size: 10px;
      transition: transform .2s;
    }
    .acc.open .acc-header::after { transform: rotate(90deg); }
    .acc-body {
      display: none;
      padding: 6px 6px 8px;
    }
    .acc.open .acc-body { display: block; }

    /* ── エフェクトボタン共通 ── */
    .btn-list { display: flex; flex-direction: column; gap: 5px; }

    .eff-btn {
      position: relative;
      display: block;
      overflow: hidden;
      padding: 0;
      height: 36px;
      line-height: 36px;
      text-align: center;
      border-radius: 5px;
      border: 1.5px solid currentColor;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
    }
    .eff-btn span.label {
      position: relative;
      z-index: 1;
      pointer-events: none;
    }
    /* エフェクト用オーバーレイ */
    .eff-btn::before,
    .eff-btn::after {
      content: '';
      position: absolute;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== 01 Swipe ===== */
    .e-swipe { color: #2a7fd4; }
    .e-swipe::before {
      top:0; left:0; bottom:0;
      width: 100%;
      background: #2a7fd4;
      transform: translateX(-100%);
      animation: swipe-anim 2.4s ease-in-out infinite;
    }
    .e-swipe .label { color: #2a7fd4; animation: swipe-txt 2.4s ease-in-out infinite; }
    @keyframes swipe-anim {
      0%,10%  { transform: translateX(-100%); }
      40%,60% { transform: translateX(0); }
      90%,100%{ transform: translateX(-100%); }
    }
    @keyframes swipe-txt {
      0%,10%  { color: #2a7fd4; }
      40%,60% { color: #fff; }
      90%,100%{ color: #2a7fd4; }
    }

    /* ===== 02 Smoosh ===== */
    .e-smoosh { color: #c0533a; }
    .e-smoosh::before {
      top:0; left:0; right:0; height:0;
      background: #c0533a;
      animation: smoosh-top 2.4s ease-in-out infinite;
    }
    .e-smoosh::after {
      bottom:0; left:0; right:0; height:0;
      background: #c0533a;
      animation: smoosh-bot 2.4s ease-in-out infinite;
    }
    .e-smoosh .label { color: #c0533a; animation: smoosh-txt 2.4s ease-in-out infinite; }
    @keyframes smoosh-top  { 0%,10%{height:0} 40%,60%{height:50%} 90%,100%{height:0} }
    @keyframes smoosh-bot  { 0%,10%{height:0} 40%,60%{height:50%} 90%,100%{height:0} }
    @keyframes smoosh-txt  { 0%,10%{color:#c0533a} 40%,60%{color:#fff} 90%,100%{color:#c0533a} }

    /* ===== 03 Double Swipe ===== */
    .e-double { color: #7a5bbf; }
    .e-double::before {
      top:0; left:0; bottom:0; width:0;
      background: #7a5bbf;
      clip-path: polygon(0 0, 100% 0, 85% 100%, 0 100%);
      animation: dbl-l 2.4s ease-in-out infinite;
    }
    .e-double::after {
      top:0; right:0; bottom:0; width:0;
      background: #7a5bbf;
      clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
      animation: dbl-r 2.4s ease-in-out infinite;
    }
    .e-double .label { color: #7a5bbf; animation: dbl-txt 2.4s ease-in-out infinite; }
    @keyframes dbl-l  { 0%,10%{width:0} 40%,60%{width:58%} 90%,100%{width:0} }
    @keyframes dbl-r  { 0%,10%{width:0} 40%,60%{width:58%} 90%,100%{width:0} }
    @keyframes dbl-txt { 0%,10%{color:#7a5bbf} 40%,60%{color:#fff} 90%,100%{color:#7a5bbf} }

    /* ===== 04 4 Corners ===== */
    .e-corners { color: #2d9e5f; }
    .e-corners::before {
      top:0; left:0; width:0; height:0;
      background: #2d9e5f;
      animation: corn-tl 2.4s ease-in-out infinite;
    }
    .e-corners::after {
      bottom:0; right:0; width:0; height:0;
      background: #2d9e5f;
      animation: corn-br 2.4s ease-in-out infinite;
    }
    .e-corners .label { color: #2d9e5f; animation: corn-txt 2.4s ease-in-out infinite; }
    @keyframes corn-tl { 0%,10%{width:0;height:0} 40%,60%{width:51%;height:100%} 90%,100%{width:0;height:0} }
    @keyframes corn-br { 0%,10%{width:0;height:0} 40%,60%{width:51%;height:100%} 90%,100%{width:0;height:0} }
    @keyframes corn-txt{ 0%,10%{color:#2d9e5f} 40%,60%{color:#fff} 90%,100%{color:#2d9e5f} }

    /* ===== 05 Diagonal Swipe ===== */
    .e-diag { color: #bf7a2a; }
    .e-diag::before {
      top:0; left:-14%; bottom:0; width:120%;
      background: #bf7a2a;
      clip-path: polygon(0 0, 88% 0, 100% 100%, 0 100%);
      transform: translateX(-110%);
      animation: diag-anim 2.4s ease-in-out infinite;
    }
    .e-diag .label { color: #bf7a2a; animation: diag-txt 2.4s ease-in-out infinite; }
    @keyframes diag-anim { 0%,10%{transform:translateX(-110%)} 40%,60%{transform:translateX(0)} 90%,100%{transform:translateX(-110%)} }
    @keyframes diag-txt  { 0%,10%{color:#bf7a2a} 40%,60%{color:#fff} 90%,100%{color:#bf7a2a} }

    /* ===== 06 Diagonal Close ===== */
    .e-diagclose { color: #b03060; background: #b03060 !important; }
    .e-diagclose::before {
      top:0; left:0; bottom:0; width:58%;
      background: #b03060;
      clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
      animation: dc-l 2.4s ease-in-out infinite;
    }
    .e-diagclose::after {
      top:0; right:0; bottom:0; width:58%;
      background: #b03060;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 15% 100%);
      animation: dc-r 2.4s ease-in-out infinite;
    }
    .e-diagclose .label { color: #fff; animation: dc-txt 2.4s ease-in-out infinite; }
    @keyframes dc-l   { 0%,10%{width:58%} 40%,60%{width:0} 90%,100%{width:58%} }
    @keyframes dc-r   { 0%,10%{width:58%} 40%,60%{width:0} 90%,100%{width:58%} }
    @keyframes dc-txt  { 0%,10%{color:#fff} 40%,60%{color:#b03060} 90%,100%{color:#fff} }

    /* ===== 07 Slice ===== */
    .e-slice { color: #3a7a9e; }
    .e-slice::before {
      top:0; left:0; bottom:0; width:0;
      background: #3a7a9e;
      clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);
      animation: slice-l 2.4s ease-in-out infinite;
    }
    .e-slice::after {
      top:0; right:0; bottom:0; width:0;
      background: #3a7a9e;
      clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%);
      animation: slice-r 2.4s ease-in-out infinite;
    }
    .e-slice .label { color: #3a7a9e; animation: slice-txt 2.4s ease-in-out infinite; }
    @keyframes slice-l { 0%,10%{width:0} 40%,60%{width:55%} 90%,100%{width:0} }
    @keyframes slice-r { 0%,10%{width:0} 40%,60%{width:55%} 90%,100%{width:0} }
    @keyframes slice-txt{ 0%,10%{color:#3a7a9e} 40%,60%{color:#fff} 90%,100%{color:#3a7a9e} }

    /* ===== 08 Zoning In ===== */
    .e-zone { color: #5a8a2a; }
    .e-zone::before {
      top:50%; left:50%; width:0; height:0;
      background: #5a8a2a;
      border-radius: 50%;
      transform: translate(-50%,-50%);
      animation: zone-anim 2.4s ease-in-out infinite;
    }
    .e-zone .label { color: #5a8a2a; animation: zone-txt 2.4s ease-in-out infinite; }
    @keyframes zone-anim { 0%,10%{width:0;height:0} 40%,60%{width:300%;height:300%} 90%,100%{width:0;height:0} }
    @keyframes zone-txt  { 0%,10%{color:#5a8a2a} 40%,60%{color:#fff} 90%,100%{color:#5a8a2a} }

    .note { margin-top: 8px; font-size: 11px; color: #888; line-height: 1.5; }
  </style>
</head>

  </div>

  <p class="note">
    ※ dual-link：left + center を同時切替<br>
    ※ トップは center のみ切替
  </p>

  <script>
    document.addEventListener("click", (e) => {
      const a = e.target.closest("a.dual-link");
      if (!a) return;
      const leftUrl = a.dataset.left;
      const centerUrl = a.dataset.center;
      if (!leftUrl || !centerUrl) return;
      e.preventDefault();
      if (parent && parent.frames) {
        if (parent.frames["left"])   parent.frames["left"].location.href = leftUrl;
        if (parent.frames["center"]) parent.frames["center"].location.href = centerUrl;
      }
    });
  </script>
