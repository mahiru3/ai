  <p class="note">
    ※ dual-link：left + center を同時切替<br>
    ※ トップは center のみ切替
  </p>

  <script>
    // 左エリアの表示/非表示を切り替える
    function setLeftVisible(visible) {
      if (!parent || !parent.document) return;
      const layout  = parent.document.querySelector(".layout");
      const areaLeft = parent.document.querySelector(".area-left");
      if (!layout || !areaLeft) return;
      if (visible) {
        areaLeft.style.display = "";
        layout.style.gridTemplateColumns = "";
      } else {
        areaLeft.style.display = "none";
        layout.style.gridTemplateColumns = "0 1fr 260px";
      }
    }

    document.addEventListener("click", (e) => {
      // dual-link：左＋中央を同時切替、左エリアを表示
      const dual = e.target.closest("a.dual-link");
      if (dual) {
        const leftUrl   = dual.dataset.left;
        const centerUrl = dual.dataset.center;
        if (!leftUrl || !centerUrl) return;
        e.preventDefault();
        setLeftVisible(true);
        if (parent && parent.frames) {
          if (parent.frames["left"])   parent.frames["left"].location.href = leftUrl;
          if (parent.frames["center"]) parent.frames["center"].location.href = centerUrl;
        }
        return;
      }

      // solo-link：中央のみ切替、左エリアを非表示
      const solo = e.target.closest("a.solo-link");
      if (solo) {
        const centerUrl = solo.dataset.center;
        if (!centerUrl) return;
        e.preventDefault();
        setLeftVisible(false);
        if (parent && parent.frames && parent.frames["center"]) {
          parent.frames["center"].location.href = centerUrl;
        }
        return;
      }

      // 通常リンク（target="center"のみ）：左エリアを表示
      const plain = e.target.closest("a[target='center']:not(.dual-link):not(.solo-link)");
      if (plain) {
        setLeftVisible(true);
      }
    });
  </script>
