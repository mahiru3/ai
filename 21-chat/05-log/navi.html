<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログ解析</title>
<link rel="stylesheet" href="../../01-css/21-chat-05-log.css" />
</head>
<body>
<div class="page-wrap">
  <h1 class="page-title">ログ解析</h1>

  <input type="file" id="fileInput">
  <button id="parseBtn">解析</button>
</div>

<script>
let rawText = '';

document.getElementById('fileInput').addEventListener('change', e=>{
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ev=> rawText = ev.target.result;
  reader.readAsText(file);
});

function parse(){
  const lines = rawText.split('\n');
  let result = [];

  lines.forEach((line,i)=>{
    if(!line.trim()) return;
    result.push({
      order: i+1,
      tab: 'main',
      kind: 'chara',
      before: '',
      after: '',
      chat: line
    });
  });

  localStorage.setItem('chatLogs', JSON.stringify(result));
  alert('解析完了');
}

document.getElementById('parseBtn').onclick = parse;
</script>
</body>
</html>
