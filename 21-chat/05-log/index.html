<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ログ整形ツール</title>
  <link rel="stylesheet" href="../../01-css/00-style.css" />
  <link rel="stylesheet" href="../../01-css/21-chat-05-log.css" />
</head>
<body>
<div class="page-wrap">

  <h1 class="page-title">📝 ログ整形ツール！！</h1>
  <p class="page-subtitle">CCFoliaのHTMLログを読み込み、発言者を整理してHTMLでダウンロードします。ページ内完結・サーバー送信なし。</p>

  <!-- ① ファイル読み込み -->
  <details class="accordion-008 acc-color-1" id="acc-1" open>
    <summary>① ファイル読み込み</summary>
    <div class="accordion-body">
      <div class="drop-zone" id="dropZone">
        <span class="drop-icon">📂</span>
        ここにCCFoliaのHTMLファイルをドラッグ＆ドロップ<br>またはクリックして選択
        <input type="file" id="fileInput" accept=".html,.htm" />
      </div>
      <div class="file-name" id="fileName">ファイル未選択</div>
      <button class="menu-btn primary" id="btnAnalyze" disabled style="margin-top:8px;">🔍 解析する</button>
      <div class="status-msg" id="loadStatus"></div>
    </div>
  </details>

  <!-- ② 発言者一覧 -->
  <details class="accordion-008 acc-color-2" id="acc-2">
    <summary>② 発言者一覧</summary>
    <div class="accordion-body">

      <div class="sp-table-wrap">
        <table class="sp-table" id="spTable">
          <thead>
            <tr>
              <th class="no-sort cb-cell"></th>
              <th data-col="tab"  class="sort-none">タブ名<span class="sort-icon"></span></th>
              <th class="no-sort cb-cell"></th>
              <th data-col="kind" class="sort-none">種別<span class="sort-icon"></span></th>
              <th class="no-sort cb-cell"></th>
              <th data-col="name" class="sort-none">変更前<span class="sort-icon"></span></th>
              <th class="no-sort">変更後</th>
            </tr>
          </thead>
          <tbody id="spTbody"></tbody>
        </table>
      </div>
      <div class="status-msg" id="analyzeStatus"></div>
    </div>
  </details>

  <!-- ③ 除外設定 -->
  <details class="accordion-008 acc-color-3" id="acc-3">
    <summary>③ 除外設定</summary>
    <div class="accordion-body">
      <label class="option-item">
        <input type="checkbox" id="optHideSystem" checked />
        <span>種別「非表示」の発言者を出力から除外する</span>
      </label>
    </div>
  </details>

  <!-- ④ プレビュー・元構造ダウンロード -->
  <details class="accordion-008 acc-color-4" id="acc-4">
    <summary>④ プレビュー・ダウンロード（元構造）</summary>
    <div class="accordion-body">
      <p style="font-size:11px;color:#888;margin:0 0 8px;">元のCCFolia HTML構造のまま出力。発言者名置換・非表示除去・&lt;br&gt;分割のみ。</p>
      <div class="menu-btn-row">
        <button class="menu-btn" id="btnPreview">👁 プレビュー更新</button>
        <button class="menu-btn dl-orig" id="btnDownload">💾 HTMLダウンロード（元構造）</button>
        <button class="menu-btn reset" id="btnReset">🔄 リセット</button>
      </div>
      <div class="preview-wrap" id="previewWrap" style="margin-top:10px;">
        <div class="preview-empty">「プレビュー更新」をクリックしてください</div>
      </div>
      <div class="status-msg" id="processStatus"></div>
    </div>
  </details>

  <!-- ⑤ 整形ダウンロード -->
  <details class="accordion-008 acc-color-5" id="acc-5">
    <summary>⑤ 整形ダウンロード</summary>
    <div class="accordion-body">
      <p style="font-size:11px;color:#888;margin:0 0 8px;">タグ装飾を付与した整形HTMLを出力します。</p>
      <div class="option-grid" style="margin-bottom:10px;">
        <label class="option-item">
          <input type="checkbox" id="optTab" checked />
          <span>タブ名（[main]等）を表示</span>
        </label>
        <label class="option-item">
          <input type="checkbox" id="optSkill" checked />
          <span>〈技能名〉を強調表示</span>
        </label>
        <label class="option-item">
          <input type="checkbox" id="optSpaceBetween" checked />
          <span>種別が変わる前後に空行を入れる</span>
        </label>
      </div>
      <button class="menu-btn dl-fmt" id="btnFormatDownload">💾 整形HTMLダウンロード</button>
      <div class="status-msg" id="formatStatus"></div>
    </div>
  </details>

</div><!-- /page-wrap -->

<script src="../../03-js/21-chat-05-log.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {

  initFileInput();

  document.getElementById("btnAnalyze").addEventListener("click", analyze);

  document.getElementById("spTable").addEventListener("click", e => {
    const th = e.target.closest("th[data-col]");
    if (!th) return;
    const col = th.dataset.col;
    sortDir = (sortCol === col && sortDir === "asc") ? "desc" : "asc";
    sortCol = col;
    renderTable();
  });

  document.getElementById("btnPreview").addEventListener("click", updatePreview);
  document.getElementById("btnDownload").addEventListener("click", downloadOriginal);
  document.getElementById("btnFormatDownload").addEventListener("click", downloadFormatted);
  document.getElementById("btnReset").addEventListener("click", resetAll);
});
</script>
</body>
</html>
