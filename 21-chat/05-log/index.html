<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ログ整形ツール</title>
  <link rel="stylesheet" href="../../01-css/00-style.css" />
  <link rel="stylesheet" href="../../01-css/21-chat-05-log.css" />
</head>
<body>
<div class="page-wrap">

  <h1 class="page-title">📝 ログ整形ツールです！</h1>
  <p class="page-subtitle">CCFoliaのHTMLログを読み込み、発言者を整理してHTMLでダウンロードします。ページ内完結・サーバー送信なし。</p>

  <!-- ① ファイル読み込み -->
  <details class="accordion-008 acc-color-1" id="acc-1" open>
    <summary>① ファイル読み込み <span class="summary-filename" id="fileName"></span></summary>
    <div class="accordion-body">
      <div class="drop-zone" id="dropZone">
        <span class="drop-icon">📂</span>
        ここにCCFoliaのHTMLファイルをドラッグ＆ドロップ<br>またはクリックして選択
        <input type="file" id="fileInput" accept=".html,.htm" />
      </div>
      <div class="analyze-row">
        <button class="btn-hover-21 bh-yellow" id="btnAnalyze" disabled><span>🔍 解析する</span></button>
        <div class="status-msg" id="loadStatus"></div>
      </div>
    </div>
  </details>

  <!-- ② 発言者一覧 -->
  <details class="accordion-008 acc-color-2" id="acc-2">
    <summary>② 発言者一覧<button class="btn-hover-21 bh-green summary-btn" id="btnRefresh" type="button"><span>🔃 更新</span></button></summary>
    <div class="accordion-body">
      <div class="sp-table-wrap">
        <table class="sp-table" id="spTable">
          <thead>
            <tr>
              <th class="no-sort th-with-filter">
                <div class="th-inner">
                  <label class="th-cb-label" onclick="event.stopPropagation()"><input type="checkbox" id="chkAllTab" class="th-cb"><span>タブ名</span></label>
                  <button class="sort-col-btn" data-col="tab"  title="ソート">⇅</button>
                  <button class="filter-btn"   data-col="tab"  title="フィルタ">▼</button>
                </div>
                <div class="filter-drop" id="filterDrop-tab"></div>
                <div class="col-resizer" data-col="tab"></div>
              </th>
              <th class="no-sort th-with-filter">
                <div class="th-inner">
                  <label class="th-cb-label" onclick="event.stopPropagation()"><input type="checkbox" id="chkAllKind" class="th-cb"><span>種別</span></label>
                  <button class="sort-col-btn" data-col="kind" title="ソート">⇅</button>
                  <button class="filter-btn"   data-col="kind" title="フィルタ">▼</button>
                </div>
                <div class="filter-drop" id="filterDrop-kind"></div>
                <div class="col-resizer" data-col="kind"></div>
              </th>
              <th class="no-sort th-with-filter">
                <div class="th-inner">
                  <label class="th-cb-label" onclick="event.stopPropagation()"><input type="checkbox" id="chkAllName" class="th-cb"><span>変更前</span></label>
                  <button class="sort-col-btn" data-col="name" title="ソート">⇅</button>
                  <button class="filter-btn"   data-col="name" title="フィルタ">▼</button>
                </div>
                <div class="filter-drop" id="filterDrop-name"></div>
                <div class="col-resizer" data-col="name"></div>
              </th>
              <th class="no-sort">変更後</th>
            </tr>
          </thead>
          <tbody id="spTbody"></tbody>
        </table>
      </div>
      <div class="status-msg" id="analyzeStatus"></div>
    </div>
  </details>

  <!-- ③ プレビュー・元構造ダウンロード（旧④） -->
  <details class="accordion-008 acc-color-4" id="acc-4">
    <summary>③ プレビュー・ダウンロード（元構造）</summary>
    <div class="accordion-body">
      <p style="font-size:11px;color:#888;margin:0 0 8px;">元のCCFolia HTML構造のまま出力。発言者名置換・非表示除去・&lt;br&gt;分割のみ。</p>
      <div class="btn-row-21">
        <button class="btn-hover-21 bh-gray" id="btnPreview"><span>👁 プレビュー更新</span></button>
        <button class="btn-hover-21 bh-green" id="btnDownload"><span>💾 HTMLダウンロード（元構造）</span></button>
        <button class="btn-hover-21 bh-red" id="btnReset"><span>🔄 リセット</span></button>
      </div>
      <div class="preview-wrap" id="previewWrap" style="margin-top:10px;">
        <div class="preview-empty">「プレビュー更新」をクリックしてください</div>
      </div>
      <div class="status-msg" id="processStatus"></div>
    </div>
  </details>

  <!-- ④ 除外設定（旧③） -->
  <details class="accordion-008 acc-color-3" id="acc-3">
    <summary>④ 除外設定</summary>
    <div class="accordion-body">
      <label class="option-item">
        <input type="checkbox" id="optHideSystem" checked />
        <span>種別「非表示」の発言者を出力から除外する</span>
      </label>
    </div>
  </details>

  <!-- ⑤ 整形ダウンロード -->
  <details class="accordion-008 acc-color-5" id="acc-5">
    <summary>⑤ 整形ダウンロード</summary>
    <div class="accordion-body">
      <p style="font-size:11px;color:#888;margin:0 0 8px;">タグ装飾を付与した整形HTMLを出力します。</p>
      <div class="option-grid" style="margin-bottom:10px;">
        <label class="option-item">
          <input type="checkbox" id="optTab" checked />
          <span>タブ名（[main]等）を表示</span>
        </label>
        <label class="option-item">
          <input type="checkbox" id="optSkill" checked />
          <span>〈技能名〉を強調表示</span>
        </label>
        <label class="option-item">
          <input type="checkbox" id="optSpaceBetween" checked />
          <span>種別が変わる前後に空行を入れる</span>
        </label>
      </div>
      <button class="btn-hover-21 bh-blue" id="btnFormatDownload"><span>💾 整形HTMLダウンロード</span></button>
      <div class="status-msg" id="formatStatus"></div>
    </div>
  </details>

</div>

<script>
/* =============================================
   ログ整形ツール メインスクリプト
   ============================================= */

const KIND_LABEL  = { chara:"キャラ", event:"テキスト", scene:"シーン", system:"非表示" };
const KIND_ORDER  = { chara:0, event:1, scene:2, system:3 };
const TAB_PRESETS = ["[main]","[info]","[other]"];

let rawHtml    = "";
let fileName   = "";
let parsedDoc  = null;
let speakerMap = {};  // key=origTab+"::"+name → {origTab,dispTab,name,kind,rename}
let tableOrder = [];
let sortCol    = null;
let sortDir    = "asc";
// フィルタ状態：null=全表示、Set=表示する値のセット
let filterTab  = null;
let filterKind = null;
let filterName = null;

/* ------------------------------------------
   ファイル読み込み
------------------------------------------ */
const dropZone   = document.getElementById("dropZone");
const fileInput  = document.getElementById("fileInput");
const fileNameEl = document.getElementById("fileName");
const loadStatus = document.getElementById("loadStatus");
const btnAnalyze = document.getElementById("btnAnalyze");

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop", e => {
  e.preventDefault(); dropZone.classList.remove("dragover");
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener("change", () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

function setFile(file) {
  if (!file.name.match(/\.html?$/i)) {
    showStatus(loadStatus, "HTMLファイルを選択してください", "err"); return;
  }
  fileName = file.name.replace(/\.html?$/i, "");
  const reader = new FileReader();
  reader.onload = ev => {
    rawHtml = ev.target.result;
    fileNameEl.textContent = "📄 " + file.name;
    fileNameEl.className = "file-name loaded";
    btnAnalyze.disabled = false;
    showStatus(loadStatus, "読み込み完了。「解析する」を押してください", "info");
    speakerMap = {}; tableOrder = []; parsedDoc = null;
    ["acc-2","acc-3","acc-4","acc-5"].forEach(id =>
      document.getElementById(id)?.removeAttribute("open")
    );
  };
  reader.readAsText(file, "UTF-8");
}

/* ------------------------------------------
   解析
------------------------------------------ */
btnAnalyze.addEventListener("click", () => {
  speakerMap = {};
  const parser = new DOMParser();
  parsedDoc = parser.parseFromString(rawHtml, "text/html");

  parsedDoc.querySelectorAll("p").forEach(p => {
    const spans = p.querySelectorAll("span");
    if (spans.length < 3) return;
    const origTab = spans[0].textContent.trim();
    const name    = spans[1].textContent.trim();
    const key     = origTab + "::" + name;
    if (!(key in speakerMap))
      speakerMap[key] = { origTab, dispTab: origTab, name, kind:"chara", rename:"" };
  });

  const spCount = Object.keys(speakerMap).length;
  if (spCount === 0) {
    showStatus(document.getElementById("analyzeStatus"), "発言者が検出できませんでした", "err"); return;
  }
  tableOrder = Object.keys(speakerMap);
  sortCol = null;
  ["acc-2","acc-3","acc-4","acc-5"].forEach(id =>
    document.getElementById(id)?.setAttribute("open","")
  );
  renderTable();
  initFilterDrops();
  initColResize();
  initRowDragSelect();
  const pCount = parsedDoc.querySelectorAll("p").length;
  showStatus(document.getElementById("analyzeStatus"),
    `${pCount} ブロック ／ 発言者 ${spCount} 件を検出`, "ok");
});

/* ------------------------------------------
   テーブル描画
   列順（4列）:
   [0] ☐タブ名  [1] ☐種別  [2] ☐変更前  [3] 変更後
   最下：▼一括変更 [まとめて変更] / bulk入力行
------------------------------------------ */
function renderTable() {
  const tbody = document.getElementById("spTbody");

  // ソート
  const sorted = [...tableOrder].sort((a, b) => {
    if (!sortCol) return 0;
    const sa = speakerMap[a], sb = speakerMap[b];
    let va, vb;
    if      (sortCol === "kind") { va = KIND_ORDER[sa.kind]; vb = KIND_ORDER[sb.kind]; }
    else if (sortCol === "tab")  { va = sa.dispTab; vb = sb.dispTab; }
    else                         { va = sa.name;    vb = sb.name; }
    if (va < vb) return sortDir === "asc" ? -1 : 1;
    if (va > vb) return sortDir === "asc" ?  1 : -1;
    return 0;
  });

  // データ行HTML生成（4列：☐タブ名 | ☐種別 | ☐変更前 | 変更後）フィルタ適用
  const dataRowsHtml = sorted.filter(key => {
    const sp = speakerMap[key];
    if (filterTab  && !filterTab.has(sp.dispTab))        return false;
    if (filterKind && !filterKind.has(sp.kind))          return false;
    if (filterName && !filterName.has(sp.name))          return false;
    return true;
  }).map(key => {
    const sp       = speakerMap[key];
    const tabRaw   = sp.dispTab.replace(/[\[\] ]/g, "");
    const tabClass = tabRaw==="main" ? "tab-main" : tabRaw==="info" ? "tab-info" : "tab-other";
    const kindOpts = Object.entries(KIND_LABEL).map(([k,l]) =>
      `<option value="${k}"${sp.kind===k?" selected":""}>${l}</option>`
    ).join("");
    const tabOptsSel = TAB_PRESETS.map(t =>
      `<option value="${ea(t)}"${sp.dispTab===t?" selected":""}>${e(t)}</option>`
    ).join("");
    const tabSelClass = _tabClass(sp.dispTab);
    return `<tr data-key="${ea(key)}">
      <td class="cb-with-val"><label><input type="checkbox" class="cb-tab"  data-key="${ea(key)}"><select class="tab-select tab-select-row ${tabSelClass}" data-key="${ea(key)}">${tabOptsSel}</select></label></td>
      <td class="cb-with-val"><label><input type="checkbox" class="cb-kind" data-key="${ea(key)}"><select class="kind-select k-${sp.kind}" data-key="${ea(key)}">${kindOpts}</select></label></td>
      <td class="cb-with-val"><label><input type="checkbox" class="cb-name" data-key="${ea(key)}"><span class="sp-name-text">${e(sp.name)}</span></label></td>
      <td><input type="text" class="sp-input${sp.rename?" changed":""}"
            placeholder="${ea(sp.name)}" value="${ea(sp.rename)}"
            data-key="${ea(key)}"></td>
    </tr>`;
  }).join("");

  // プリセットoption
  const tabPresetOpts = TAB_PRESETS.map(t =>
    `<option value="${ea(t)}">${e(t)}</option>`
  ).join("");
  const bulkKindOpts = Object.entries(KIND_LABEL).map(([k,l]) =>
    `<option value="${k}">${l}</option>`
  ).join("");

  // 一括変更行HTML（ボタン行 → 入力行）
  const bulkHtml = `
    <tr class="bulk-sep-row"><td colspan="4"></td></tr>
    <tr class="bulk-btn-row">
      <td><button class="btn-hover-21 bh-gray col-bulk-btn" id="btnBulkTab"  type="button"><span>🔄 一括変更</span></button></td>
      <td><button class="btn-hover-21 bh-gray col-bulk-btn" id="btnBulkKind" type="button"><span>🔄 一括変更</span></button></td>
      <td><button class="btn-hover-21 bh-gray col-bulk-btn" id="btnBulkName" type="button"><span>🔄 一括変更</span></button></td>
      <td></td>
    </tr>
    <tr class="bulk-input-row">
      <td>
        <div class="bulk-tab-cell">
          <select id="bulkTabSelect">${tabPresetOpts}</select>
          <span class="bulk-or">or</span>
          <input type="text" id="bulkTabInput" placeholder="新規タブ名">
        </div>
      </td>
      <td><select class="kind-select k-chara" id="bulkKindSelect">${bulkKindOpts}</select></td>
      <td><input type="text" class="sp-input" id="bulkRenameInput" placeholder="変更後の名前"></td>
      <td></td>
    </tr>`;

  tbody.innerHTML = dataRowsHtml + bulkHtml;
  initRowDragSelect();

  /* --- 個別行イベント --- */

  // タブセレクト（個別）
  tbody.querySelectorAll(".tab-select-row").forEach(sel => {
    sel.addEventListener("change", ev => {
      const key = ev.target.dataset.key;
      speakerMap[key].dispTab = ev.target.value;
      // 色クラスを更新
      ev.target.className = "tab-select tab-select-row " + _tabClass(ev.target.value);
    });
  });

  // 種別セレクト
  tbody.querySelectorAll("tr[data-key] .kind-select").forEach(sel => {
    sel.addEventListener("change", e => {
      const key  = e.target.dataset.key;
      const kind = e.target.value;
      speakerMap[key].kind = kind;
      e.target.className = "kind-select k-" + kind;
      // 「テキスト」に変更したら変更後に★0000★を自動入力（未入力の場合のみ）
      if (kind === "event" && !speakerMap[key].rename) {
        speakerMap[key].rename = "★0000★";
        // 同じ行のsp-inputを更新
        const inp = e.target.closest("tr")?.querySelector(".sp-input");
        if (inp) { inp.value = "★0000★"; inp.classList.add("changed"); }
      }
    });
  });

  // 変更後テキスト
  tbody.querySelectorAll("tr[data-key] .sp-input").forEach(inp => {
    inp.addEventListener("input", e => {
      const key = e.target.dataset.key;
      speakerMap[key].rename = e.target.value;
      e.target.classList.toggle("changed", e.target.value !== "");
    });
  });

  /* --- 一括変更イベント --- */

  // タブselectが変わったらtextをクリア
  document.getElementById("bulkTabSelect").addEventListener("change", () => {
    document.getElementById("bulkTabInput").value = "";
  });
  document.getElementById("bulkTabInput").addEventListener("input", () => {
    document.getElementById("bulkTabSelect").selectedIndex = 0;
  });

  // タブ列🔄 → チェック済みのタブを変更
  document.getElementById("btnBulkTab").addEventListener("click", () => {
    const tabInput = document.getElementById("bulkTabInput").value.trim();
    const newTab   = tabInput !== "" ? tabInput : document.getElementById("bulkTabSelect").value;
    const checked  = new Set([...tbody.querySelectorAll(".cb-tab:checked")].map(c => c.dataset.key));
    let n = 0;
    checked.forEach(key => { speakerMap[key].dispTab = newTab; n++; });
    if (n > 0) { renderTable(); showStatus(document.getElementById("analyzeStatus"), `タブ名 ${n} 件を変更しました`, "ok"); }
  });

  // 種別列🔄 → チェック済みの種別を変更
  document.getElementById("btnBulkKind").addEventListener("click", () => {
    const newKind = document.getElementById("bulkKindSelect").value;
    const checked = new Set([...tbody.querySelectorAll(".cb-kind:checked")].map(c => c.dataset.key));
    let n = 0;
    checked.forEach(key => {
      speakerMap[key].kind = newKind;
      // 「テキスト」に変更したら変更後に★0000★を自動入力（未入力の場合のみ）
      if (newKind === "event" && !speakerMap[key].rename) {
        speakerMap[key].rename = "★0000★";
      }
      n++;
    });
    if (n > 0) { renderTable(); showStatus(document.getElementById("analyzeStatus"), `種別 ${n} 件を変更しました`, "ok"); }
  });

  // 変更前列🔄 → チェック済みの名前を変更
  document.getElementById("btnBulkName").addEventListener("click", () => {
    const newName = document.getElementById("bulkRenameInput").value.trim();
    if (!newName) return;
    const checked = new Set([...tbody.querySelectorAll(".cb-name:checked")].map(c => c.dataset.key));
    let n = 0;
    checked.forEach(key => { speakerMap[key].rename = newName; n++; });
    if (n > 0) { renderTable(); showStatus(document.getElementById("analyzeStatus"), `変更後 ${n} 件を設定しました`, "ok"); }
  });

  /* --- ソートアイコン更新 --- */
  document.querySelectorAll("#spTable th[data-col]").forEach(th => {
    th.className = th.dataset.col === sortCol ? "sort-" + sortDir : "sort-none";
  });
}

// 「更新」ボタン：renameをnameに昇格、renameをクリア
document.getElementById("btnRefresh").addEventListener("click", () => {
  let count = 0;
  Object.keys(speakerMap).forEach(key => {
    const sp = speakerMap[key];
    if (sp.rename.trim() !== "") {
      sp.name   = sp.rename.trim();
      sp.rename = "";
      // speakerMapのキーは変えないが表示名を更新
      count++;
    }
  });
  if (count > 0) {
    renderTable();
    showStatus(document.getElementById("analyzeStatus"), `${count} 件の変更前を更新しました`, "ok");
  }
});

// =============================================
// フィルタ ドロップダウン構築
// =============================================
// フィルタ初期化（解析後に1回だけ呼ぶ）
function initFilterDrops() {
  filterTab = null; filterKind = null; filterName = null;
  rebuildFilterDrops();
}

// フィルタドロップダウンの中身を全speakerMapから生成
function rebuildFilterDrops() {
  const allKeys = Object.keys(speakerMap);
  const vals = {
    tab:  [...new Set(allKeys.map(k => speakerMap[k].dispTab))],
    kind: [...new Set(allKeys.map(k => speakerMap[k].kind))],
    name: [...new Set(allKeys.map(k => speakerMap[k].name))]
  };
  const filters = { tab: filterTab, kind: filterKind, name: filterName };

  ["tab","kind","name"].forEach(col => {
    const drop = document.getElementById("filterDrop-" + col);
    if (!drop) return;
    const cur = filters[col];
    const allChecked = !cur;

    drop.innerHTML =
      // すべて選択・解除ボタン行
      `<div class="fd-ctrl-row">
        <button class="fd-ctrl-btn" data-col="${col}" data-act="all">すべて選択</button>
        <button class="fd-ctrl-btn" data-col="${col}" data-act="none">解除</button>
      </div>` +
      // （すべて）チェックボックス
      `<div class="fd-item fd-all-item"><label><input type="checkbox" class="fd-all" data-col="${col}"${allChecked?" checked":""}> （すべて）</label></div>` +
      vals[col].map(v => {
        const disp    = col==="kind" ? (KIND_LABEL[v]||v) : v;
        const checked = !cur || cur.has(v) ? " checked" : "";
        return `<div class="fd-item"><label><input type="checkbox" class="fd-val" data-col="${col}" data-val="${ea(v)}"${checked}> ${e(disp)}</label></div>`;
      }).join("");

    // すべて選択・解除ボタン
    drop.querySelectorAll(".fd-ctrl-btn").forEach(btn => {
      btn.addEventListener("click", e => {
        e.stopPropagation();
        const act = btn.dataset.act;
        drop.querySelectorAll(".fd-val").forEach(cb => cb.checked = act==="all");
        drop.querySelector(".fd-all").checked = act==="all";
        _applyFilter(col, true); // keepOpenフラグ
      });
    });

    // 「すべて」チェックボックス
    drop.querySelector(".fd-all").addEventListener("change", function() {
      drop.querySelectorAll(".fd-val").forEach(v => v.checked = this.checked);
      _applyFilter(col, true);
    });

    // 個別チェック
    drop.querySelectorAll(".fd-val").forEach(cb => {
      cb.addEventListener("change", () => {
        const all = [...drop.querySelectorAll(".fd-val")].every(v => v.checked);
        drop.querySelector(".fd-all").checked = all;
        _applyFilter(col, true);
      });
    });
  });
}

function _applyFilter(col, keepOpen=false) {
  const drop    = document.getElementById("filterDrop-" + col);
  if (!drop) return;
  const checkedVals = [...drop.querySelectorAll(".fd-val:checked")].map(v => v.dataset.val);
  const allChecked  = drop.querySelector(".fd-all")?.checked ?? true;
  if      (col==="tab")  filterTab  = allChecked ? null : new Set(checkedVals);
  else if (col==="kind") filterKind = allChecked ? null : new Set(checkedVals);
  else if (col==="name") filterName = allChecked ? null : new Set(checkedVals);
  const btn = document.querySelector(`.filter-btn[data-col="${col}"]`);
  if (btn) btn.classList.toggle("filter-active", !allChecked);
  renderTable();
  // チェック状態を保持して再描画
  rebuildFilterDrops();
  if (keepOpen) document.getElementById("filterDrop-" + col)?.classList.add("open");
}

// フィルタドロップダウン 開閉 ＆ ソートボタン
document.getElementById("spTable").addEventListener("click", e => {
  // フィルタ▼ボタン
  const filterBtn = e.target.closest(".filter-btn");
  if (filterBtn) {
    e.stopPropagation();
    const col  = filterBtn.dataset.col;
    const drop = document.getElementById("filterDrop-" + col);
    const open = drop.classList.contains("open");
    document.querySelectorAll(".filter-drop").forEach(d => d.classList.remove("open"));
    if (!open) drop.classList.add("open");
    return;
  }
  // ソート⇅ボタン
  const sortBtn = e.target.closest(".sort-col-btn");
  if (sortBtn) {
    e.stopPropagation();
    const col = sortBtn.dataset.col;
    sortDir = sortCol === col && sortDir === "asc" ? "desc" : "asc";
    sortCol = col;
    // アイコン更新
    document.querySelectorAll(".sort-col-btn").forEach(b => b.textContent = "⇅");
    sortBtn.textContent = sortDir === "asc" ? "▲" : "▼";
    renderTable();
    rebuildFilterDrops();
    return;
  }
});

/* ------------------------------------------
   共通：出力行生成（プレビュー・元構造DL共通）
   種別「テキスト」の場合：
     1行目: [tab] dispName : 元の発言者名
     2行目: [tab] dispName : 元の本文
------------------------------------------ */
function buildOriginalLines(optHide) {
  const lines = [];
  parsedDoc.querySelectorAll("p").forEach(p => {
    const spans = p.querySelectorAll("span");
    if (spans.length < 3) return;
    const origTab = spans[0].textContent.trim();
    const name    = spans[1].textContent.trim();
    const key     = origTab + "::" + name;
    const sp      = speakerMap[key] || { kind:"chara", rename:"", dispTab:origTab };
    if (optHide && sp.kind === "system") return;

    const dispName = sp.rename.trim() || name;
    const dispTab  = sp.dispTab || origTab;
    const parts    = spans[2].innerHTML.split(/<br\s*\/?>/i).map(s => s.trim()).filter(s => s);

    if (sp.kind === "event") {
      // テキスト種別：発言者名を1行目として追加、本文を続ける
      lines.push(`<p style="color:#888888;"><span> ${e(dispTab)}</span> <span>${e(dispName)}</span> : <span> ${e(name)} </span></p>`);
      parts.forEach(part => {
        lines.push(`<p style="color:#888888;"><span> ${e(dispTab)}</span> <span>${e(dispName)}</span> : <span> ${part} </span></p>`);
      });
    } else {
      parts.forEach(part => {
        lines.push(`<p style="color:#888888;"><span> ${e(dispTab)}</span> <span>${e(dispName)}</span> : <span> ${part} </span></p>`);
      });
    }
  });
  return lines;
}

/* ------------------------------------------
   ④ プレビュー
------------------------------------------ */
document.getElementById("btnPreview").addEventListener("click", () => {
  if (!parsedDoc) return;
  const optHide = document.getElementById("optHideSystem").checked;
  const wrap    = document.getElementById("previewWrap");
  const lines   = buildOriginalLines(optHide);
  wrap.innerHTML = lines.length
    ? lines.join("\n")
    : `<div class="preview-empty">表示できる行がありません</div>`;
});

/* ------------------------------------------
   ④ 元構造ダウンロード
------------------------------------------ */
document.getElementById("btnDownload").addEventListener("click", () => {
  if (!parsedDoc) { showStatus(document.getElementById("processStatus"),"先に解析してください","err"); return; }
  const optHide  = document.getElementById("optHideSystem").checked;

  // buildOriginalLinesの結果を<p>形式に変換
  const pBlocks = buildOriginalLines(optHide).map(line => {
    // すでに<p>タグ形式なのでそのまま使う（インデント整形）
    return line;
  });

  const headEl = parsedDoc.querySelector("head");
  let headHtml = headEl ? headEl.outerHTML : `<head><meta charset="UTF-8"/></head>`;
  headHtml = headHtml.replace(/<title>[^<]*<\/title>/, `<title>${e(fileName)}</title>`);

  dl(`<!DOCTYPE html>\n<html lang="ja">\n${headHtml}\n  <body>\n    \n\n${pBlocks.join("\n\n")}\n\n  </body>\n</html>`,
     fileName + "_整形済み.html");
  showStatus(document.getElementById("processStatus"), "ダウンロードしました！", "ok");
});

/* ------------------------------------------
   ⑤ 整形ダウンロード
------------------------------------------ */
document.getElementById("btnFormatDownload").addEventListener("click", () => {
  if (!parsedDoc) { showStatus(document.getElementById("formatStatus"),"先に解析してください","err"); return; }
  const optTab   = document.getElementById("optTab").checked;
  const optSkill = document.getElementById("optSkill").checked;
  const optHide  = document.getElementById("optHideSystem").checked;
  const optSpace = document.getElementById("optSpaceBetween").checked;
  const lines    = [];
  let prevKind   = null;

  parsedDoc.querySelectorAll("p").forEach(p => {
    const spans = p.querySelectorAll("span");
    if (spans.length < 3) return;
    const origTab = spans[0].textContent.trim();
    const name    = spans[1].textContent.trim();
    const key     = origTab + "::" + name;
    const sp      = speakerMap[key] || { kind:"chara", rename:"", dispTab:origTab };
    const kind    = sp.kind;
    if (optHide && kind === "system") return;

    const dispName = sp.rename.trim() || name;
    const dispTab  = sp.dispTab || origTab;
    const tabRaw   = dispTab.replace(/[\[\] ]/g,"");
    const tabClass = tabRaw==="main"?"log-tab-main":tabRaw==="info"?"log-tab-info":"log-tab-other";
    const tabHtml  = optTab ? `<span class="log-tab ${tabClass}">${e(dispTab)}</span>` : "";

    const parts = spans[2].innerHTML.split(/<br\s*\/?>/i).map(s => s.trim()).filter(s => s);

    // テキスト種別：発言者名を1行目として追加
    if (kind === "event") {
      if (optSpace && prevKind !== null && prevKind !== kind)
        lines.push(`<p style="margin:0;line-height:1;">&nbsp;</p>`);
      prevKind = kind;
      lines.push(`<p style="color:#888888;">${tabHtml}<span>${e(dispName)}</span> : <span> ${e(name)} </span></p>`);
    }

    parts.forEach(part => {
        if (optSpace && prevKind !== null && prevKind !== kind)
          lines.push(`<p style="margin:0;line-height:1;">&nbsp;</p>`);
        prevKind = kind;
        let text = part;
        if (optSkill) text = text.replace(/〈([^〉]+)〉/g,`<span class="skill-hl">〈$1〉</span>`);
        lines.push(`<p style="color:#888888;">${tabHtml}<span>${e(dispName)}</span> : <span> ${text} </span></p>`);
      });
  });

  const headEl = parsedDoc.querySelector("head");
  let headHtml = headEl ? headEl.outerHTML : `<head><meta charset="UTF-8"/></head>`;
  headHtml = headHtml.replace(/<title>[^<]*<\/title>/, `<title>${e(fileName)}</title>`);
  headHtml = headHtml.replace("</head>",
    `  <style>
    .log-tab{font-size:10px;font-weight:700;margin-right:6px;padding:1px 6px;border-radius:3px;vertical-align:middle;display:inline-block}
    .log-tab-main{background:#fff3e0;color:#a85400}
    .log-tab-info{background:#e8f0fe;color:#1a56a0}
    .log-tab-other{background:#f0f0f0;color:#888}
    .skill-hl{background:#fff8e0;color:#7a5000;border-radius:3px;padding:0 2px;font-weight:600;font-size:.9em}
  </style>\n</head>`);

  dl(`<!DOCTYPE html>\n<html lang="ja">\n${headHtml}\n  <body>\n    \n\n${lines.join("\n")}\n\n  </body>\n</html>`,
     fileName + "_整形.html");
  showStatus(document.getElementById("formatStatus"), "ダウンロードしました！", "ok");
});

// =============================================
// ② 列幅リサイズ
// =============================================
function initColResize() {
  const table = document.getElementById("spTable");
  if (!table) return;
  table.querySelectorAll(".col-resizer").forEach(handle => {
    let startX, startW, th;
    handle.addEventListener("mousedown", e => {
      e.preventDefault();
      e.stopPropagation();
      th     = handle.closest("th");
      startX = e.clientX;
      startW = th.offsetWidth;
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";

      const onMove = ev => {
        const w = Math.max(60, startW + ev.clientX - startX);
        th.style.width    = w + "px";
        th.style.minWidth = w + "px";
      };
      const onUp = () => {
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup",   onUp);
      };
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup",   onUp);
    });
  });
}

// =============================================
// ③ 行ドラッグ選択（cb-tab / cb-kind / cb-name をまとめてON/OFF）
// =============================================
function initRowDragSelect() {
  const tbody = document.getElementById("spTbody");
  if (!tbody) return;
  let dragging  = false;
  let startKey  = null;
  let dragState = null; // true=チェックON, false=チェックOFF

  // どのチェックボックスクラスを操作するか（最初に触ったcb-xxxで決定）
  let targetCbClass = null;

  tbody.addEventListener("mousedown", e => {
    const cb = e.target.closest(".cb-tab, .cb-kind, .cb-name");
    if (!cb) return;
    const row = cb.closest("tr[data-key]");
    if (!row) return;
    dragging       = true;
    startKey       = row.dataset.key;
    dragState      = !cb.checked; // 最初の状態を反転
    targetCbClass  = [...cb.classList].find(cls => cls.startsWith("cb-"));
    cb.checked     = dragState;
    e.preventDefault();
  });

  tbody.addEventListener("mousemove", e => {
    if (!dragging || !targetCbClass) return;
    const td  = e.target.closest("td");
    const row = td ? td.closest("tr[data-key]") : null;
    if (!row) return;
    const cb = row.querySelector("." + targetCbClass);
    if (cb) cb.checked = dragState;
  });

  document.addEventListener("mouseup", () => {
    dragging = false; startKey = null; dragState = null; targetCbClass = null;
  });
}

// タブ値→CSSクラス
function _tabClass(tab) {
  const raw = tab.replace(/[\[\] ]/g,"");
  if (raw==="main")  return "t-main";
  if (raw==="info")  return "t-info";
  if (raw==="other") return "t-other";
  return "t-other2";
}

function e(s)  { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function ea(s) { return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;"); }
function dl(html, name) {
  const a = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(new Blob([html],{type:"text/html;charset=utf-8"})),
    download: name
  });
  a.click(); URL.revokeObjectURL(a.href);
}
function showStatus(el, msg, type) {
  if (!el) return; el.textContent = msg; el.className = "status-msg show " + type;
}
