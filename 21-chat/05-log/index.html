<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログ整形ツール</title>

<link rel="stylesheet" href="../../01-css/21-chat-05-log.css" />

</head>
<body>

<div class="page-wrap">

  <h1 class="page-title">ログ整形ツール</h1>
  <p class="page-subtitle">フィルタ・並び替え・順序再採番対応</p>

  <!-- ▼ 操作エリア -->
  <div class="btn-row-21">
    <button class="btn-hover-21" onclick="parseLog()">解析</button>
    <button class="btn-hover-21" onclick="reindexOrder()">順 再採番</button>
    <button class="btn-hover-21" onclick="preview()">プレビュー</button>
  </div>

  <!-- ▼ テーブル -->
  <div class="sp-table-scroll">
    <table class="sp-table" id="logTable">
      <thead>
        <tr>
          <th>順 <button onclick="sortBy('order')">⇅</button></th>
          <th>タブ名 <button onclick="toggleFilter('tab')">F</button></th>
          <th>種別 <button onclick="toggleFilter('kind')">F</button></th>
          <th>変更前</th>
          <th>変更後</th>
          <th>チャット</th>
          <th><input type="checkbox" onclick="toggleAll(this)"></th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>

  <!-- ▼ プレビュー -->
  <div class="preview-wrap" id="previewArea"></div>

</div>

<script>

/* =========================
   データ本体（拡張前提）
========================= */
let rows = [];
let filters = {
  tab: new Set(),
  kind: new Set()
};

/* =========================
   解析
========================= */
function parseLog() {

  rows = [];

  // 仮データ（ここは自由に差し替え可能）
  const sample = [
    {tab:"main", kind:"chara", before:"A", after:"A1", chat:"こんにちは"},
    {tab:"main", kind:"chara", before:"A", after:"A2", chat:"続き"},
    {tab:"info", kind:"system", before:"B", after:"", chat:"ログ"}
  ];

  sample.forEach((r,i)=>{
    rows.push({
      order: i+1,
      ...r,
      checked: false
    });
  });

  buildTable();
}

/* =========================
   テーブル生成
========================= */
function buildTable() {

  const body = document.getElementById("logBody");
  body.innerHTML = "";

  rows.forEach((r,i)=>{

    if (!filterPass(r)) return;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.order}</td>
      <td>${r.tab}</td>
      <td>${r.kind}</td>
      <td>${r.before}</td>
      <td><input value="${r.after}" onchange="updateAfter(${i},this.value)"></td>
      <td><textarea onchange="updateChat(${i},this.value)">${r.chat}</textarea></td>
      <td><input type="checkbox" ${r.checked?"checked":""} onchange="toggleRow(${i},this)"></td>
    `;

    body.appendChild(tr);
  });
}

/* =========================
   フィルタ
========================= */
function toggleFilter(type){

  const values = [...new Set(rows.map(r=>r[type]))];

  const selected = prompt(`${type} フィルタ\nカンマ区切り指定\n候補:${values.join(",")}`);

  if (!selected) return;

  filters[type] = new Set(selected.split(","));

  buildTable();
}

function filterPass(r){

  if (filters.tab.size && !filters.tab.has(r.tab)) return false;
  if (filters.kind.size && !filters.kind.has(r.kind)) return false;

  return true;
}

/* =========================
   ソート
========================= */
function sortBy(key){

  rows.sort((a,b)=>{
    if (a[key] > b[key]) return 1;
    if (a[key] < b[key]) return -1;
    return 0;
  });

  buildTable();
}

/* =========================
   順 再採番
========================= */
function reindexOrder(){

  rows.forEach((r,i)=>{
    r.order = i+1;
  });

  buildTable();
}

/* =========================
   更新処理
========================= */
function updateAfter(i,val){
  rows[i].after = val;
}

function updateChat(i,val){
  rows[i].chat = val;
}

function toggleRow(i,el){
  rows[i].checked = el.checked;
}

function toggleAll(el){

  rows.forEach(r=>{
    if (filterPass(r)) r.checked = el.checked;
  });

  buildTable();
}

/* =========================
   プレビュー
========================= */
function preview(){

  const area = document.getElementById("previewArea");

  const visible = rows.filter(r=>r.checked && filterPass(r));

  if (!visible.length){
    area.innerHTML = "<div class='preview-empty'>選択された行がありません</div>";
    return;
  }

  area.innerHTML = visible.map(r=>{
    return `<div>
      <span class="log-tab log-tab-${r.tab}">${r.tab}</span>
      ${r.after || r.before}：${r.chat}
    </div>`;
  }).join("");
}

</script>

</body>
</html>
