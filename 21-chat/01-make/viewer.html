<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>jobs.json / skills.json ビュワー（開発確認用）</title>
<link rel="stylesheet" href="viewer.css">
</head>
<body>

<header>
  <h1>jobs.json / skills.json ビュワー（開発確認用）</h1>
  <div class="header-actions">
    <button class="btn btn-primary" id="exportBtn" title="検証状態を反映したjobs.jsonをダウンロード">💾 エクスポート</button>
    <button class="btn" id="importBtn" title="以前エクスポートしたjobs.jsonを読み込む">📂 インポート</button>
    <button class="btn btn-danger" id="resetBtn" title="ローカルの編集データを削除">🔄 リセット</button>
    <input type="file" id="importFile" accept=".json" style="display:none;">
  </div>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="検索 (職業名・ID・番号・技能名)">
  <label>source:
    <select id="sourceFilter">
      <option value="">すべて</option>
      <option value="基本">基本</option>
      <option value="2010">2010</option>
      <option value="2015">2015</option>
    </select>
  </label>
  <label>verified:
    <select id="verifiedFilter">
      <option value="">すべて</option>
      <option value="pending">pending</option>
      <option value="verified">verified</option>
      <option value="mismatch">mismatch</option>
    </select>
  </label>
  <div class="stats" id="stats">読込中...</div>
</div>

<div class="tabs">
  <button class="tab active" data-mode="jobs">職業一覧</button>
  <button class="tab" data-mode="skills">技能一覧</button>
  <button class="tab" data-mode="reverse">技能→職業逆引き</button>
</div>

<main>
  <div class="list-pane" id="listPane"><div class="empty">読込中...</div></div>
  <div class="resizer" id="resizer" title="ドラッグで幅変更／ダブルクリックで初期値"></div>
  <div class="detail-pane" id="detailPane"><div class="empty">左のリストから項目を選択してください</div></div>
</main>

<footer>
  <span>データソース: ./data/jobs.json, ./data/skills.json, ./data/specialties.json</span>
  <span id="localSaveStatus">ローカル変更: 0件</span>
</footer>

<script>
// =============================================================
// ストレージキー
// =============================================================
const STORAGE_KEY = "viewer_verification_v1";   // 検証データ（既存職業の差分）
const NEW_JOBS_KEY = "viewer_new_jobs_v1";      // 新規追加された職業（複製で作られたもの）
const UI_STORAGE_KEY = "viewer_ui_v1";
const DEFAULT_LIST_WIDTH = 420;

// =============================================================
// データ
// =============================================================
let jobsData = null;
let skillsData = null;
let specialtiesData = null;

let currentMode = "jobs";
let selectedJobId = null;
let selectedSkillId = null;
let reverseSelectedSkills = new Set();

const skillsMap = new Map();

// 既存職業の編集差分
let localChanges = {};
// 新規追加職業（複製で作成されたもの）
let newJobs = [];

const EDITABLE_FIELDS = [
  "verified", "verified_note", "verified_at", "verified_source",
  "special_notes", "skill_points_formula", "skill_points_note"
];

let saveTimer = null;

// =============================================================
// UI設定
// =============================================================
function loadUI() {
  try {
    const raw = localStorage.getItem(UI_STORAGE_KEY);
    if (raw) {
      const ui = JSON.parse(raw);
      if (ui.listWidth) {
        document.documentElement.style.setProperty("--list-width", ui.listWidth + "px");
      }
    }
  } catch (e) { console.error(e); }
}
function saveUI(ui) {
  try {
    const prev = localStorage.getItem(UI_STORAGE_KEY);
    const current = prev ? JSON.parse(prev) : {};
    localStorage.setItem(UI_STORAGE_KEY, JSON.stringify({...current, ...ui}));
  } catch (e) { console.error(e); }
}

// =============================================================
// ローカルデータ操作
// =============================================================
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) localChanges = JSON.parse(raw);
  } catch (e) { console.error(e); localChanges = {}; }

  try {
    const raw = localStorage.getItem(NEW_JOBS_KEY);
    if (raw) newJobs = JSON.parse(raw);
  } catch (e) { console.error(e); newJobs = []; }
}

function saveLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(localChanges));
    localStorage.setItem(NEW_JOBS_KEY, JSON.stringify(newJobs));
    updateLocalSaveStatus();
    flashSaveIndicator();
  } catch (e) { console.error(e); }
}

function clearLocal() {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(NEW_JOBS_KEY);
  localChanges = {};
  newJobs = [];
  updateLocalSaveStatus();
}

function updateLocalSaveStatus() {
  const count = Object.keys(localChanges).length + newJobs.length;
  const newPart = newJobs.length > 0 ? `（追加: ${newJobs.length}件）` : '';
  document.getElementById("localSaveStatus").textContent = `ローカル変更: ${count}件${newPart}`;
}

function flashSaveIndicator() {
  const el = document.querySelector(".save-indicator");
  if (!el) return;
  el.classList.add("show");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.classList.remove("show"), 1200);
}

// 全職業（既存 + 新規）を取得
function getAllJobs() {
  return [...jobsData.jobs, ...newJobs];
}

// 職業の現在の値を取得（ローカル優先）
function getJobCurrent(job) {
  // 新規追加職業はそのまま
  if (job._isNew) {
    const result = { modified: true };
    EDITABLE_FIELDS.forEach(f => {
      result[f] = job[f] !== undefined ? job[f] : defaultFieldValue(f);
    });
    return result;
  }
  const local = localChanges[job.id] || {};
  const result = { modified: Object.keys(local).length > 0 };
  EDITABLE_FIELDS.forEach(f => {
    result[f] = local[f] !== undefined ? local[f] : (job[f] !== undefined ? job[f] : defaultFieldValue(f));
  });
  return result;
}

function defaultFieldValue(field) {
  switch (field) {
    case "verified": return "pending";
    case "verified_note":
    case "verified_source":
    case "special_notes":
    case "skill_points_note": return "";
    case "skill_points_formula": return "EDU*20";
    case "verified_at": return null;
    default: return "";
  }
}

// 編集内容を保存
function updateJobField(jobId, field, value) {
  const allJobs = getAllJobs();
  const job = allJobs.find(j => j.id === jobId);
  if (!job) return;

  // 新規追加職業の場合は直接書き換え
  if (job._isNew) {
    job[field] = value;
    saveLocal();
    return;
  }

  if (!localChanges[jobId]) localChanges[jobId] = {};
  const origValue = job[field] !== undefined ? job[field] : defaultFieldValue(field);

  if (value === origValue || (value === "" && (origValue === null || origValue === undefined))) {
    delete localChanges[jobId][field];
    if (Object.keys(localChanges[jobId]).length === 0) {
      delete localChanges[jobId];
    }
  } else {
    localChanges[jobId][field] = value;
  }
  saveLocal();
}

// =============================================================
// 複製機能
// =============================================================
function cloneJob(originalId, newSource) {
  const orig = getAllJobs().find(j => j.id === originalId);
  if (!orig) return null;

  // 新IDを生成: 元IDから既存sourceを削って新sourceを付与
  const baseId = orig.id.replace(/_(基本|2010|2015|2020|houserule).*$/, "")
                        .replace(/_basic$/, "")
                        .replace(/_2010$/, "")
                        .replace(/_2015$/, "")
                        .replace(/_2020$/, "")
                        .replace(/_houserule$/, "");
  // sourceを英字IDに変換
  const sourceIdMap = {"基本": "basic", "2010": "2010", "2015": "2015", "2020": "2020", "houserule": "houserule"};
  const sourceId = sourceIdMap[newSource] || newSource.toLowerCase().replace(/[^a-z0-9]/g, "_");

  let newId = `${baseId}_${sourceId}`;
  // 衝突チェック
  let counter = 2;
  const allIds = new Set(getAllJobs().map(j => j.id));
  while (allIds.has(newId)) {
    newId = `${baseId}_${sourceId}_${counter}`;
    counter++;
  }

  // 新番号: 既存最大+1
  const maxNum = Math.max(...getAllJobs().map(j => parseInt(j.number || "0")));
  const newNumber = String(maxNum + 1).padStart(3, "0");

  // 新規ジョブを作成（fixed_skillsとchoice_groupsはdeep copy）
  const newJob = {
    id: newId,
    number: newNumber,
    name: orig.name,
    display_name: `${newNumber}. ${orig.name}（${newSource}）`,
    edition: orig.edition || "6",
    source: newSource,
    description: orig.description || "",
    skill_points_formula: orig.skill_points_formula || "EDU*20",
    fixed_skills: [...orig.fixed_skills],
    choice_groups: orig.choice_groups.map(g => ({...g, candidates: [...g.candidates]})),
    verified: "pending",
    verified_note: `${orig.number}. ${orig.name}（${orig.source}）から複製`,
    verified_at: new Date().toISOString().slice(0,19).replace("T"," "),
    verified_source: null,
    special_notes: "",
    skill_points_note: "",
    based_on: orig.id,   // 派生元を記録
    _isNew: true         // 新規追加フラグ
  };

  newJobs.push(newJob);
  saveLocal();
  return newJob;
}

function deleteNewJob(jobId) {
  const idx = newJobs.findIndex(j => j.id === jobId);
  if (idx >= 0) {
    newJobs.splice(idx, 1);
    saveLocal();
    return true;
  }
  return false;
}

// =============================================================
// 技能名解決
// =============================================================
function resolveSkillName(skillKey) {
  if (skillKey.includes(":")) {
    const [parent, specialty] = skillKey.split(":");
    const parentSkill = skillsMap.get(parent);
    const parentName = parentSkill ? parentSkill.name : parent;
    let specialtyName = specialty;
    if (specialtiesData && specialtiesData.specialties[parent]) {
      const found = specialtiesData.specialties[parent].find(s => s.id === specialty);
      if (found) specialtyName = found.name;
    }
    return `${parentName}（${specialtyName}）`;
  }
  const s = skillsMap.get(skillKey);
  return s ? s.name : skillKey;
}

// =============================================================
// 初期化
// =============================================================
async function init() {
  loadUI();
  loadLocal();
  try {
    const [jobsRes, skillsRes, specRes] = await Promise.all([
      fetch("./data/jobs.json"),
      fetch("./data/skills.json"),
      fetch("./data/specialties.json"),
    ]);
    jobsData = await jobsRes.json();
    skillsData = await skillsRes.json();
    specialtiesData = await specRes.json();

    skillsData.skills.forEach(s => skillsMap.set(s.id, s));
    setupResizer();
    updateStats();
    updateLocalSaveStatus();
    renderList();
  } catch (e) {
    document.getElementById("listPane").innerHTML =
      `<div class="empty">データ読込エラー: ${e.message}<br><br>ローカルで開く場合はhttpサーバ経由で開いてください。</div>`;
    console.error(e);
  }
}

function updateStats() {
  const all = getAllJobs();
  const byVerified = {pending:0, verified:0, mismatch:0};
  all.forEach(j => {
    const v = getJobCurrent(j);
    byVerified[v.verified]++;
  });
  const newPart = newJobs.length > 0 ? ` <span class="badge-new" style="padding:0 6px;border-radius:8px;font-size:10px;">新規 +${newJobs.length}</span>` : '';
  document.getElementById("stats").innerHTML =
    `<span class="status-pending">?${byVerified.pending}</span> ` +
    `<span class="status-verified">✓${byVerified.verified}</span> ` +
    `<span class="status-mismatch">⚠${byVerified.mismatch}</span> / ${all.length}件${newPart}`;
}

// =============================================================
// リサイザー
// =============================================================
function setupResizer() {
  const resizer = document.getElementById("resizer");
  let startX, startWidth;

  function onMouseMove(e) {
    const delta = e.clientX - startX;
    let newWidth = startWidth + delta;
    newWidth = Math.max(200, Math.min(window.innerWidth - 200, newWidth));
    document.documentElement.style.setProperty("--list-width", newWidth + "px");
  }
  function onMouseUp() {
    document.removeEventListener("mousemove", onMouseMove);
    document.removeEventListener("mouseup", onMouseUp);
    document.body.classList.remove("resizing");
    resizer.classList.remove("dragging");
    const widthStr = getComputedStyle(document.documentElement).getPropertyValue("--list-width").trim();
    const width = parseInt(widthStr);
    if (width) saveUI({listWidth: width});
  }

  resizer.addEventListener("mousedown", (e) => {
    startX = e.clientX;
    const widthStr = getComputedStyle(document.documentElement).getPropertyValue("--list-width").trim();
    startWidth = parseInt(widthStr) || DEFAULT_LIST_WIDTH;
    document.body.classList.add("resizing");
    resizer.classList.add("dragging");
    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup", onMouseUp);
    e.preventDefault();
  });

  resizer.addEventListener("dblclick", () => {
    document.documentElement.style.setProperty("--list-width", DEFAULT_LIST_WIDTH + "px");
    saveUI({listWidth: DEFAULT_LIST_WIDTH});
  });
}

// =============================================================
// タブ切替
// =============================================================
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentMode = tab.dataset.mode;
    document.getElementById("search").value = "";
    reverseSelectedSkills.clear();
    renderList();
    renderDetail();
  });
});

document.getElementById("search").addEventListener("input", renderList);
document.getElementById("sourceFilter").addEventListener("change", renderList);
document.getElementById("verifiedFilter").addEventListener("change", renderList);

// =============================================================
// ヘッダーボタン
// =============================================================
document.getElementById("exportBtn").addEventListener("click", exportJobs);
document.getElementById("importBtn").addEventListener("click", () => {
  document.getElementById("importFile").click();
});
document.getElementById("importFile").addEventListener("change", importJobs);
document.getElementById("resetBtn").addEventListener("click", () => {
  showModal({
    title: "ローカル変更をリセット",
    body: `ローカルストレージに保存されている編集データ（差分${Object.keys(localChanges).length}件、新規追加${newJobs.length}件）を削除します。<br>この操作は取り消せません。よろしいですか？`,
    okLabel: "リセットする",
    okClass: "btn-danger",
    onOk: () => {
      clearLocal();
      updateStats();
      renderList();
      renderDetail();
    }
  });
});

function exportJobs() {
  // 既存職業をマージ
  const merged = jobsData.jobs.map(j => {
    const v = getJobCurrent(j);
    const result = { ...j };
    EDITABLE_FIELDS.forEach(f => { result[f] = v[f]; });
    return result;
  });
  // 新規追加（_isNewフラグ削除）
  const cleanNew = newJobs.map(j => {
    const copy = {...j};
    delete copy._isNew;
    return copy;
  });

  const output = {
    ...jobsData,
    jobs: [...merged, ...cleanNew]
  };

  const json = JSON.stringify(output, null, 2);
  const blob = new Blob([json], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const now = new Date();
  const ts = now.getFullYear() +
    String(now.getMonth()+1).padStart(2,"0") +
    String(now.getDate()).padStart(2,"0") + "_" +
    String(now.getHours()).padStart(2,"0") +
    String(now.getMinutes()).padStart(2,"0");
  a.href = url;
  a.download = `jobs_verified_${ts}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJobs(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.jobs || !Array.isArray(data.jobs)) {
        alert("jobs.json形式のファイルではありません");
        return;
      }
      let diffCount = 0;
      let newCount = 0;
      const origIds = new Set(jobsData.jobs.map(j => j.id));

      data.jobs.forEach(imported => {
        if (!origIds.has(imported.id)) {
          // 元データに無いID → 新規追加職業
          const exists = newJobs.find(n => n.id === imported.id);
          if (exists) {
            // 既に取り込み済みなら上書き
            Object.assign(exists, imported, {_isNew: true});
          } else {
            newJobs.push({...imported, _isNew: true});
            newCount++;
          }
          return;
        }
        const origJob = jobsData.jobs.find(j => j.id === imported.id);
        const diff = {};
        EDITABLE_FIELDS.forEach(f => {
          const importedVal = imported[f] !== undefined ? imported[f] : defaultFieldValue(f);
          const origVal = origJob[f] !== undefined ? origJob[f] : defaultFieldValue(f);
          if (importedVal !== origVal) {
            diff[f] = importedVal;
          }
        });
        if (Object.keys(diff).length > 0) {
          localChanges[imported.id] = diff;
          diffCount++;
        }
      });
      saveLocal();
      updateStats();
      renderList();
      renderDetail();
      alert(`差分${diffCount}件、新規追加${newCount}件を読み込みました`);
    } catch (err) {
      alert("読込エラー: " + err.message);
    }
    e.target.value = "";
  };
  reader.readAsText(file);
}

// =============================================================
// モーダル
// =============================================================
function showModal({title, bodyHtml, onOk, okLabel = "OK", okClass = "btn-primary", showCancel = true}) {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal-box">
      <h3>${title}</h3>
      ${bodyHtml}
      <div class="actions">
        ${showCancel ? '<button class="btn" data-action="cancel">キャンセル</button>' : ''}
        <button class="btn ${okClass}" data-action="ok">${okLabel}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  function close() { overlay.remove(); }
  overlay.addEventListener("click", ev => {
    if (ev.target === overlay || ev.target.dataset.action === "cancel") {
      close();
    } else if (ev.target.dataset.action === "ok") {
      const result = onOk ? onOk(overlay) : true;
      if (result !== false) close();
    }
  });
  return overlay;
}

// 互換用: 古いモーダル呼び出し
function showSimpleModal(opts) {
  return showModal({
    ...opts,
    bodyHtml: `<p>${opts.body || ''}</p>`,
    onOk: opts.onOk
  });
}
// 既存のshowModalインターフェース互換
const _showModalOrig = showModal;
window.showModalCompat = function(opts) {
  if (opts.body && !opts.bodyHtml) {
    return showSimpleModal(opts);
  }
  return _showModalOrig(opts);
};

// 複製ダイアログ
function showCloneDialog(originalId) {
  const orig = getAllJobs().find(j => j.id === originalId);
  if (!orig) return;

  const bodyHtml = `
    <p>「<b>${orig.number}. ${orig.name}（${orig.source}）</b>」を別sourceとして複製します。</p>
    <div class="form-row">
      <label for="clone-source">複製先のsource</label>
      <select id="clone-source">
        <option value="2010">2010</option>
        <option value="2015" selected>2015</option>
        <option value="2020">2020</option>
        <option value="基本">基本</option>
        <option value="houserule">houserule</option>
        <option value="__custom">その他（自由入力）</option>
      </select>
    </div>
    <div class="form-row" id="clone-custom-row" style="display:none;">
      <label for="clone-custom">source名</label>
      <input type="text" id="clone-custom" placeholder="例: 2026, oneshot等">
    </div>
    <div class="form-row">
      <label>プレビュー</label>
      <div class="preview" id="clone-preview"></div>
    </div>
  `;

  const overlay = showModal({
    title: "📋 職業を複製",
    bodyHtml: bodyHtml,
    okLabel: "複製する",
    onOk: (overlay) => {
      const sel = overlay.querySelector("#clone-source").value;
      const custom = overlay.querySelector("#clone-custom").value;
      const newSource = sel === "__custom" ? (custom.trim() || "custom") : sel;

      // 同じsourceで複製しようとしたら警告
      if (newSource === orig.source) {
        if (!confirm(`元と同じsource「${newSource}」で複製します。よろしいですか？`)) {
          return false;
        }
      }
      const newJob = cloneJob(originalId, newSource);
      if (newJob) {
        updateStats();
        renderList();
        selectedJobId = newJob.id;
        renderJobDetail(newJob.id);
        // 該当行までスクロール
        setTimeout(() => {
          const el = document.querySelector(`.job-row[data-id="${newJob.id}"]`);
          if (el) el.scrollIntoView({block:"center"});
        }, 50);
      }
      return true;
    }
  });

  // プレビューと自由入力の連動
  const sourceSelect = overlay.querySelector("#clone-source");
  const customInput = overlay.querySelector("#clone-custom");
  const customRow = overlay.querySelector("#clone-custom-row");
  const preview = overlay.querySelector("#clone-preview");

  function updatePreview() {
    const sel = sourceSelect.value;
    const customVal = customInput.value;
    customRow.style.display = sel === "__custom" ? "flex" : "none";
    const newSource = sel === "__custom" ? (customVal.trim() || "custom") : sel;
    const maxNum = Math.max(...getAllJobs().map(j => parseInt(j.number || "0")));
    const newNumber = String(maxNum + 1).padStart(3, "0");
    preview.textContent = `${newNumber}. ${orig.name}（${newSource}）`;
  }
  sourceSelect.addEventListener("change", updatePreview);
  customInput.addEventListener("input", updatePreview);
  updatePreview();
}

// =============================================================
// リスト描画
// =============================================================
function renderList() {
  const pane = document.getElementById("listPane");
  const q = document.getElementById("search").value.toLowerCase().trim();
  const sourceF = document.getElementById("sourceFilter").value;
  const verifiedF = document.getElementById("verifiedFilter").value;

  if (currentMode === "jobs") {
    const all = getAllJobs();
    const filtered = all.filter(j => {
      const v = getJobCurrent(j);
      if (sourceF && j.source !== sourceF) return false;
      if (verifiedF && v.verified !== verifiedF) return false;
      if (!q) return true;
      const hay = [j.name, j.id, j.number, j.source, v.verified_note, v.special_notes].join(" ").toLowerCase();
      const skillNames = [...j.fixed_skills, ...j.choice_groups.flatMap(g => g.candidates)]
        .map(s => resolveSkillName(s)).join(" ").toLowerCase();
      return hay.includes(q) || skillNames.includes(q);
    });
    pane.innerHTML = filtered.map(j => {
      const v = getJobCurrent(j);
      const icon = {pending:"?", verified:"✓", mismatch:"⚠"}[v.verified];
      const modifiedMark = v.modified ? '<span class="modified-mark" title="ローカル変更あり"></span>' : '';
      const newBadge = j._isNew ? ' <span class="badge-new" style="padding:0 4px;border-radius:6px;font-size:9px;">NEW</span>' : '';
      return `
        <div class="job-row ${j.id === selectedJobId ? 'selected' : ''}" data-id="${j.id}">
          <span class="status-icon status-${v.verified}">${icon}</span>
          <span class="num">${j.number}</span>
          <span class="name">${j.name}${modifiedMark}${newBadge}<br><small>${j.id} · ${j.source}</small></span>
        </div>
      `;
    }).join("") || `<div class="empty">該当なし</div>`;
    pane.querySelectorAll(".job-row").forEach(el => {
      el.addEventListener("click", () => {
        selectedJobId = el.dataset.id;
        pane.querySelectorAll(".job-row").forEach(r => r.classList.remove("selected"));
        el.classList.add("selected");
        renderJobDetail(selectedJobId);
      });
    });
  }

  else if (currentMode === "skills") {
    const filtered = skillsData.skills.filter(s => {
      if (!q) return true;
      const hay = [s.id, s.name, s.category, s.subcategory].join(" ").toLowerCase();
      return hay.includes(q);
    });
    const byCat = {};
    filtered.forEach(s => {
      if (!byCat[s.category]) byCat[s.category] = [];
      byCat[s.category].push(s);
    });
    let html = "";
    skillsData.categories.forEach(cat => {
      if (!byCat[cat.id]) return;
      html += `<div class="category-header">${cat.name}</div>`;
      byCat[cat.id].forEach(s => {
        html += `
          <div class="skill-row ${s.id === selectedSkillId ? 'selected' : ''}" data-id="${s.id}">
            <span>${s.name} <small class="skill-chip-id-inline">${s.id}</small></span>
            <span class="cat">${s.subcategory || ""}</span>
          </div>
        `;
      });
    });
    pane.innerHTML = html || `<div class="empty">該当なし</div>`;
    pane.querySelectorAll(".skill-row").forEach(el => {
      el.addEventListener("click", () => {
        selectedSkillId = el.dataset.id;
        pane.querySelectorAll(".skill-row").forEach(r => r.classList.remove("selected"));
        el.classList.add("selected");
        renderSkillDetail(selectedSkillId);
      });
    });
  }

  else if (currentMode === "reverse") {
    const filtered = skillsData.skills.filter(s => {
      if (!q) return true;
      const hay = [s.id, s.name].join(" ").toLowerCase();
      return hay.includes(q);
    });
    let html = `<div class="reverse-search-hint">技能を選択すると、その技能を<b>職業技能として持つ職業</b>が右側に表示されます。複数選択可能（AND条件）。</div>`;
    const byCat = {};
    filtered.forEach(s => {
      if (!byCat[s.category]) byCat[s.category] = [];
      byCat[s.category].push(s);
    });
    skillsData.categories.forEach(cat => {
      if (!byCat[cat.id]) return;
      html += `<div class="category-header">${cat.name}</div>`;
      byCat[cat.id].forEach(s => {
        const checked = reverseSelectedSkills.has(s.id) ? "checked" : "";
        html += `
          <label class="skill-row">
            <span><input type="checkbox" data-id="${s.id}" ${checked}> ${s.name} <small class="skill-chip-id-inline">${s.id}</small></span>
          </label>
        `;
      });
    });
    pane.innerHTML = html;
    pane.querySelectorAll("input[type=checkbox]").forEach(cb => {
      cb.addEventListener("change", () => {
        if (cb.checked) reverseSelectedSkills.add(cb.dataset.id);
        else reverseSelectedSkills.delete(cb.dataset.id);
        renderReverseDetail();
      });
    });
    renderReverseDetail();
  }
}

// =============================================================
// 詳細描画
// =============================================================
function renderDetail() {
  if (currentMode === "jobs" && selectedJobId) renderJobDetail(selectedJobId);
  else if (currentMode === "skills" && selectedSkillId) renderSkillDetail(selectedSkillId);
  else if (currentMode === "reverse") renderReverseDetail();
  else document.getElementById("detailPane").innerHTML = `<div class="empty">左のリストから項目を選択してください</div>`;
}

function renderJobDetail(id) {
  const j = getAllJobs().find(x => x.id === id);
  if (!j) return;
  const v = getJobCurrent(j);
  const statusIcon = {pending:"?", verified:"✓", mismatch:"⚠"}[v.verified];

  const fixedChips = j.fixed_skills.map(s =>
    `<span class="skill-chip" title="${s}">${resolveSkillName(s)}<br><span class="skill-chip id">${s}</span></span>`
  ).join("");

  const choiceHtml = j.choice_groups.map(g => `
    <div class="choice-group">
      <div class="label">${g.label}</div>
      ${g.candidates.map(c => `<span class="skill-chip" title="${c}">${resolveSkillName(c)}<br><span class="skill-chip id">${c}</span></span>`).join("")}
    </div>
  `).join("");

  const lastSaved = v.verified_at ? `最終更新: ${v.verified_at}` : "未更新";

  // 新規追加職業の場合は「削除」ボタンを表示、それ以外は表示しない
  const deleteBtn = j._isNew ? `<button class="btn btn-small btn-danger" id="deleteCloneBtn" title="この複製を削除">🗑 削除</button>` : '';
  const basedOnInfo = j.based_on ? `<span class="badge badge-clone">複製元: ${j.based_on}</span>` : '';

  document.getElementById("detailPane").innerHTML = `
    <div class="job-detail">
      <h2>
        <span class="status-icon status-${v.verified}">${statusIcon}</span>
        ${j.number}. ${j.name}
        <div class="job-actions">
          <button class="btn btn-small" id="cloneBtn" title="この職業を別sourceとして複製">📋 複製</button>
          ${deleteBtn}
        </div>
      </h2>
      <div>
        <span class="badge">ID: ${j.id}</span>
        <span class="badge">source: ${j.source}</span>
        <span class="badge">edition: ${j.edition}</span>
        ${j._isNew ? '<span class="badge badge-new">新規追加</span>' : ''}
        ${basedOnInfo}
        ${v.modified && !j._isNew ? '<span class="badge badge-accent">ローカル変更あり</span>' : ''}
      </div>
      ${j.description ? `<p class="description">${j.description}</p>` : ""}

      <div class="verify-form">
        <h3>🔍 検証ステータス</h3>
        <div class="form-row">
          <label class="field-label">ステータス</label>
          <div class="radio-group">
            <label><input type="radio" name="verify-status" value="pending" ${v.verified === "pending" ? "checked" : ""}>
              <span class="status-pending">? 未検証</span></label>
            <label><input type="radio" name="verify-status" value="verified" ${v.verified === "verified" ? "checked" : ""}>
              <span class="status-verified">✓ 検証済み</span></label>
            <label><input type="radio" name="verify-status" value="mismatch" ${v.verified === "mismatch" ? "checked" : ""}>
              <span class="status-mismatch">⚠ 不一致</span></label>
          </div>
        </div>
        <div class="form-row">
          <label class="field-label" for="verify-source">参照元</label>
          <input type="text" id="verify-source" value="${escapeAttr(v.verified_source || "")}" placeholder="例: えいよん卓Wiki、ルルブp.62">
        </div>
        <div class="form-row">
          <label class="field-label" for="verify-note">備考</label>
          <textarea id="verify-note" placeholder="気づいたことを自由に記入">${escapeHtml(v.verified_note || "")}</textarea>
        </div>
        <div class="form-footer">
          <span>${lastSaved}</span>
          <span class="save-indicator">✓ 保存しました</span>
        </div>
      </div>

      <div class="verify-form notes-form">
        <h3>📋 職業情報（編集可）</h3>
        <div class="form-row">
          <label class="field-label" for="points-formula">職業Pt算出</label>
          <input type="text" id="points-formula" value="${escapeAttr(v.skill_points_formula || "EDU*20")}" placeholder="例: EDU*20, EDU*10+DEX*10">
        </div>
        <div class="form-row">
          <label class="field-label" for="points-note">Pt補足</label>
          <input type="text" id="points-note" value="${escapeAttr(v.skill_points_note || "")}" placeholder="例: 2015サプリ：STR+EDUの合計×10">
        </div>
        <div class="form-row">
          <label class="field-label" for="special-notes">特記</label>
          <textarea id="special-notes" placeholder="特記事項（特殊能力・権限・独自ルールなど）">${escapeHtml(v.special_notes || "")}</textarea>
        </div>
      </div>

      <h3>固定の職業技能 (${j.fixed_skills.length})</h3>
      <div>${fixedChips || '<span class="empty-inline">なし</span>'}</div>

      <h3>選択式の職業技能 (${j.choice_groups.length}グループ)</h3>
      ${choiceHtml || '<span class="empty-inline">なし</span>'}

      <details class="raw-toggle">
        <summary>raw JSON</summary>
        <pre class="raw-json">${escapeHtml(JSON.stringify(getMergedJob(j), null, 2))}</pre>
      </details>
    </div>
  `;

  // 検証ステータス
  document.querySelectorAll('input[name="verify-status"]').forEach(r => {
    r.addEventListener("change", () => {
      const status = r.value;
      updateJobField(j.id, "verified", status);
      updateJobField(j.id, "verified_at", new Date().toISOString().slice(0,19).replace("T"," "));
      refreshRowIcon(j.id, status);
      updateStats();
      updateH2Icon(status);
    });
  });
  document.getElementById("verify-source").addEventListener("input", (e) => {
    updateJobField(j.id, "verified_source", e.target.value || null);
  });
  document.getElementById("verify-note").addEventListener("input", (e) => {
    updateJobField(j.id, "verified_note", e.target.value);
  });
  document.getElementById("points-formula").addEventListener("input", (e) => {
    updateJobField(j.id, "skill_points_formula", e.target.value);
  });
  document.getElementById("points-note").addEventListener("input", (e) => {
    updateJobField(j.id, "skill_points_note", e.target.value);
  });
  document.getElementById("special-notes").addEventListener("input", (e) => {
    updateJobField(j.id, "special_notes", e.target.value);
  });

  // 複製ボタン
  document.getElementById("cloneBtn").addEventListener("click", () => {
    showCloneDialog(j.id);
  });

  // 削除ボタン（新規職業のみ）
  if (j._isNew) {
    document.getElementById("deleteCloneBtn").addEventListener("click", () => {
      showModal({
        title: "複製した職業を削除",
        bodyHtml: `<p><b>${j.number}. ${j.name}（${j.source}）</b> を削除します。<br>この操作は取り消せません。よろしいですか？</p>`,
        okLabel: "削除する",
        okClass: "btn-danger",
        onOk: () => {
          if (deleteNewJob(j.id)) {
            selectedJobId = null;
            updateStats();
            renderList();
            document.getElementById("detailPane").innerHTML = `<div class="empty">削除しました。左のリストから項目を選択してください</div>`;
          }
        }
      });
    });
  }
}

function refreshRowIcon(jobId, status) {
  const row = document.querySelector(`.job-row[data-id="${jobId}"]`);
  if (!row) return;
  const icon = {pending:"?", verified:"✓", mismatch:"⚠"}[status];
  const iconEl = row.querySelector(".status-icon");
  iconEl.textContent = icon;
  iconEl.className = `status-icon status-${status}`;
  if (!row.querySelector(".modified-mark")) {
    const nameEl = row.querySelector(".name");
    const mark = document.createElement("span");
    mark.className = "modified-mark";
    mark.title = "ローカル変更あり";
    const br = nameEl.querySelector("br");
    if (br) nameEl.insertBefore(mark, br);
    else nameEl.appendChild(mark);
  }
}
function updateH2Icon(status) {
  const h2Icon = document.querySelector(".job-detail h2 .status-icon");
  if (h2Icon) {
    h2Icon.textContent = {pending:"?", verified:"✓", mismatch:"⚠"}[status];
    h2Icon.className = `status-icon status-${status}`;
  }
}

function getMergedJob(j) {
  const v = getJobCurrent(j);
  const merged = { ...j };
  EDITABLE_FIELDS.forEach(f => { merged[f] = v[f]; });
  delete merged._isNew;
  return merged;
}

function renderSkillDetail(id) {
  const s = skillsMap.get(id);
  if (!s) return;
  const cat = skillsData.categories.find(c => c.id === s.category);
  const sub = cat && cat.subcategories.find(sc => sc.id === s.subcategory);

  const allJobs = getAllJobs();
  const relatedJobs = allJobs.filter(j =>
    j.fixed_skills.includes(id) || j.choice_groups.some(g => g.candidates.includes(id))
  );

  const specialtyJobs = {};
  allJobs.forEach(j => {
    const allSkills = [...j.fixed_skills, ...j.choice_groups.flatMap(g => g.candidates)];
    allSkills.forEach(sk => {
      if (sk.startsWith(id + ":")) {
        if (!specialtyJobs[sk]) specialtyJobs[sk] = [];
        specialtyJobs[sk].push(j);
      }
    });
  });

  const initialText = s.initial_formula ? `式: ${s.initial_formula}` : (s.initial_value !== undefined ? `${s.initial_value}%` : "?");

  document.getElementById("detailPane").innerHTML = `
    <div class="job-detail">
      <h2>${s.name}</h2>
      <div>
        <span class="badge">ID: ${s.id}</span>
        <span class="badge">${cat ? cat.name : s.category}</span>
        ${sub ? `<span class="badge">${sub.name}</span>` : ""}
        <span class="badge">初期値: ${initialText}</span>
        ${s.is_specialty ? '<span class="badge badge-accent">専門分野あり</span>' : ""}
      </div>
      ${s.description ? `<p class="description">${s.description}</p>` : ""}

      ${s.is_specialty && specialtiesData.specialties[s.id] ? `
        <h3>定義済み専門分野 (${specialtiesData.specialties[s.id].length})</h3>
        <div>${specialtiesData.specialties[s.id].map(sp =>
          `<span class="skill-chip">${sp.name}<br><span class="skill-chip id">${s.id}:${sp.id}</span></span>`
        ).join("")}</div>
      ` : ""}

      <h3>この技能を職業技能に持つ職業 (${relatedJobs.length})</h3>
      ${relatedJobs.map(j => {
        const isFixed = j.fixed_skills.includes(id);
        return `<span class="skill-chip clickable" data-jump="${j.id}">
          ${j.number}. ${j.name} <small>(${isFixed ? '固定' : '選択'})</small>
        </span>`;
      }).join("") || '<span class="empty-inline">なし</span>'}

      ${Object.keys(specialtyJobs).length > 0 ? `
        <h3>専門分野付きで持つ職業</h3>
        ${Object.entries(specialtyJobs).map(([key, jobs]) => `
          <div class="specialty-row">
            <b>${resolveSkillName(key)}</b>:
            ${jobs.map(j => `<span class="skill-chip clickable" data-jump="${j.id}">${j.number}. ${j.name}</span>`).join("")}
          </div>
        `).join("")}
      ` : ""}

      <details class="raw-toggle">
        <summary>raw JSON</summary>
        <pre class="raw-json">${escapeHtml(JSON.stringify(s, null, 2))}</pre>
      </details>
    </div>
  `;

  document.querySelectorAll("[data-jump]").forEach(el => {
    el.addEventListener("click", () => jumpToJob(el.dataset.jump));
  });
}

function renderReverseDetail() {
  const selected = [...reverseSelectedSkills];
  const pane = document.getElementById("detailPane");

  if (selected.length === 0) {
    pane.innerHTML = `<div class="empty">左のチェックボックスで技能を選択してください</div>`;
    return;
  }

  const matches = getAllJobs().filter(j => {
    const allSkills = new Set([
      ...j.fixed_skills,
      ...j.choice_groups.flatMap(g => g.candidates)
    ]);
    return selected.every(s => allSkills.has(s));
  });

  pane.innerHTML = `
    <div class="job-detail">
      <h2>逆引き結果</h2>
      <div class="selected-skills">
        選択中の技能:
        ${selected.map(s => `<span class="filter-chip" data-remove="${s}">${resolveSkillName(s)} ×</span>`).join("")}
      </div>
      <div class="result-count">
        これらをすべて職業技能として持つ職業: <b>${matches.length}件</b>
      </div>
      ${matches.length === 0 ? '<div class="empty">該当なし</div>' : matches.map(j => {
        const v = getJobCurrent(j);
        const icon = {pending:"?", verified:"✓", mismatch:"⚠"}[v.verified];
        return `
          <div class="job-row clickable" data-jump="${j.id}">
            <span class="status-icon status-${v.verified}">${icon}</span>
            <span class="num">${j.number}</span>
            <span class="name">${j.name} <small>(${j.source})</small></span>
          </div>
        `;
      }).join("")}
    </div>
  `;

  pane.querySelectorAll("[data-jump]").forEach(el => {
    el.addEventListener("click", () => jumpToJob(el.dataset.jump));
  });
  pane.querySelectorAll("[data-remove]").forEach(el => {
    el.addEventListener("click", () => toggleReverse(el.dataset.remove));
  });
}

function toggleReverse(id) {
  reverseSelectedSkills.delete(id);
  renderList();
  renderReverseDetail();
}

function jumpToJob(id) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelector('.tab[data-mode="jobs"]').classList.add("active");
  currentMode = "jobs";
  document.getElementById("search").value = "";
  selectedJobId = id;
  renderList();
  renderJobDetail(id);
  setTimeout(() => {
    const el = document.querySelector(`.job-row[data-id="${id}"]`);
    if (el) el.scrollIntoView({block:"center"});
  }, 50);
}

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}
function escapeAttr(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;")
    .replace(/"/g, "&quot;");
}

init();
</script>
</body>
</html>
