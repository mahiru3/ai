<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fade プレビュー</title>
  <link rel="stylesheet" href="../../01-css/31-csv-03-btn.css" />
</head>
<body>
  <h2>Fade — プレビュー</h2>

  <div class="preview-wrap">
    <div id="preview-area"></div>
  </div>

  <div class="dl-panel">
    <h3>ダウンロード</h3>
    <div class="dl-row">
      <button class="dl-btn primary" id="btn-svg">SVG 保存</button>
      <button class="dl-btn" id="btn-apng">APNG 保存（静止画）</button>
    </div>
  </div>

  <div class="code-panel">
    <h3>SVG コード</h3>
    <textarea id="svg-code" readonly></textarea>
    <button class="copy-btn" id="btn-copy">コピー</button>
  </div>

  <p class="note">
    ※ 出力サイズ 24×24px・プレビューは 120×120px で表示しています。<br>
    ※ APNG はアニメーションなし（静止画）での保存になります。
  </p>

  <script>
    const OUT = 24;
    const PRV = 120;

    let cfg = {
      color:    "#9a4fbf",
      duration: 1.0,
      loop:     true,
      reverse:  false,
    };

    // 透明→色：0→1  逆：1→0
    function buildSVG(c, size) {
      const repeat = c.loop ? "indefinite" : "1";
      const vals   = c.reverse ? "1;0" : "0;1";
      // ループしない場合、終了後にそのまま保持
      const fill   = c.loop ? "remove" : "freeze";

      return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${OUT} ${OUT}">
  <rect width="${OUT}" height="${OUT}" fill="${c.color}">
    <animate attributeName="opacity"
      values="${vals}"
      dur="${c.duration.toFixed(2)}s"
      repeatCount="${repeat}"
      fill="${fill}"/>
  </rect>
</svg>`;
    }

    function render(c) {
      document.getElementById("preview-area").innerHTML = buildSVG(c, PRV);
      document.getElementById("svg-code").value = buildSVG(c, OUT);
    }

    window.applyConfig = function(newCfg) {
      cfg = { ...cfg, ...newCfg };
      render(cfg);
    };

    document.addEventListener("click", (e) => {
      if (e.target.id === "btn-svg") {
        const blob = new Blob([buildSVG(cfg, OUT)], { type: "image/svg+xml" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "fade.svg";
        a.click();
      }

      if (e.target.id === "btn-apng") {
        const url = URL.createObjectURL(new Blob([buildSVG(cfg, OUT)], { type: "image/svg+xml" }));
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = OUT; canvas.height = OUT;
          canvas.getContext("2d").drawImage(img, 0, 0);
          URL.revokeObjectURL(url);
          const a = document.createElement("a");
          a.href = canvas.toDataURL("image/png");
          a.download = "fade.png";
          a.click();
        };
        img.src = url;
      }

      if (e.target.id === "btn-copy") {
        navigator.clipboard.writeText(buildSVG(cfg, OUT)).then(() => {
          const btn = document.getElementById("btn-copy");
          btn.textContent = "コピー済";
          setTimeout(() => btn.textContent = "コピー", 1000);
        });
      }
    });

    render(cfg);
  </script>
</body>
</html>
