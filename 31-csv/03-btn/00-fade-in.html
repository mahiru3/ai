<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fade プレビュー</title>
  <link rel="stylesheet" href="../../01-css/01-main.css" />
  <style>
    body {
      margin: 0;
      padding: 20px 24px;
      font-family: sans-serif;
      font-size: 13px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 16px;
    }

    /* ── プレビュー ── */
    .preview-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background: #f0f0f0;
      border-radius: 8px;
      margin-bottom: 20px;
      min-height: 140px;
    }

    #preview-svg {
      display: block;
    }

    /* ── ダウンロードパネル ── */
    .dl-panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }

    .dl-panel h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: #444;
    }

    .dl-row {
      display: flex;
      gap: 8px;
    }

    .dl-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid #bbb;
      border-radius: 5px;
      background: #f8f8f8;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
    }
    .dl-btn:hover { background: #eef3ff; border-color: #7ab; }

    .dl-btn.primary {
      background: #4a7fd4;
      color: #fff;
      border-color: #4a7fd4;
    }
    .dl-btn.primary:hover { background: #3a6fc4; }

    /* ── SVGコード表示 ── */
    .code-panel {
      background: #f6f6f6;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .code-panel h3 {
      margin: 0 0 6px;
      font-size: 12px;
      color: #666;
    }

    textarea {
      width: 100%;
      height: 120px;
      font-family: monospace;
      font-size: 11px;
      border: none;
      background: transparent;
      resize: vertical;
      box-sizing: border-box;
      color: #333;
    }

    .copy-btn {
      margin-top: 4px;
      padding: 4px 12px;
      font-size: 11px;
      border: 1px solid #bbb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }
    .copy-btn:hover { background: #eef3ff; }

    .note {
      margin-top: 12px;
      font-size: 11px;
      color: #999;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h2>Fade — プレビュー</h2>

  <div class="preview-wrap">
    <svg id="preview-svg" xmlns="http://www.w3.org/2000/svg"
         width="260" height="80" viewBox="0 0 260 80">
    </svg>
  </div>

  <div class="dl-panel">
    <h3>ダウンロード</h3>
    <div class="dl-row">
      <button class="dl-btn primary" id="btn-svg">SVG 保存</button>
      <button class="dl-btn" id="btn-apng">APNG 保存（静止画）</button>
    </div>
  </div>

  <div class="code-panel">
    <h3>SVG コード</h3>
    <textarea id="svg-code" readonly></textarea>
    <button class="copy-btn" id="btn-copy">コピー</button>
  </div>

  <p class="note">
    ※ APNG はアニメーションなし（静止画）での保存になります。<br>
    ※ SVG ファイルはブラウザで開くとアニメーションが再生されます。
  </p>

  <script>
    // デフォルト設定
    let cfg = {
      color:   "#9a4fbf",
      fadeIn:  0.8,
      hold:    0.6,
      fadeOut: 0.8,
      wait:    0.6,
      w:       260,
      h:       80,
    };

    function buildSVG(c) {
      const total = c.fadeIn + c.hold + c.fadeOut + c.wait;
      const t1 = c.fadeIn / total;
      const t2 = (c.fadeIn + c.hold) / total;
      const t3 = (c.fadeIn + c.hold + c.fadeOut) / total;
      const dur = total.toFixed(2);

      // テキスト色アニメーション用
      const hex = c.color;

      return `<svg xmlns="http://www.w3.org/2000/svg"
  width="${c.w}" height="${c.h}" viewBox="0 0 ${c.w} ${c.h}">
  <rect width="${c.w}" height="${c.h}" rx="6"
    fill="none" stroke="${hex}" stroke-width="2"/>
  <rect width="${c.w}" height="${c.h}" rx="6" fill="${hex}">
    <animate attributeName="opacity"
      values="0;0;1;1;0;0"
      keyTimes="0;${(0.05).toFixed(3)};${t1.toFixed(3)};${t2.toFixed(3)};${t3.toFixed(3)};1"
      dur="${dur}s" repeatCount="indefinite"/>
  </rect>
  <text x="${c.w/2}" y="${c.h/2}" dy="0.35em"
    text-anchor="middle"
    font-family="sans-serif" font-size="18" font-weight="600">
    <animate attributeName="fill"
      values="${hex};${hex};#ffffff;#ffffff;${hex};${hex}"
      keyTimes="0;${(0.05).toFixed(3)};${t1.toFixed(3)};${t2.toFixed(3)};${t3.toFixed(3)};1"
      dur="${dur}s" repeatCount="indefinite"/>
    Fade
  </text>
</svg>`;
    }

    function render(c) {
      const svgStr = buildSVG(c);
      document.getElementById("preview-svg").outerHTML = svgStr;
      // outerHTML置換後に再取得
      document.getElementById("svg-code").value = svgStr;
    }

    // 外部（nv）から呼ばれる関数
    window.applyConfig = function(newCfg) {
      cfg = { ...cfg, ...newCfg };
      render(cfg);
    };

    // SVG保存
    document.addEventListener("click", (e) => {
      if (e.target.id === "btn-svg") {
        const svgStr = buildSVG(cfg);
        const blob = new Blob([svgStr], { type: "image/svg+xml" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "fade.svg";
        a.click();
      }

      if (e.target.id === "btn-apng") {
        // SVGをcanvasに描画→PNG化（静止画）
        const svgStr = buildSVG(cfg);
        const blob = new Blob([svgStr], { type: "image/svg+xml" });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = cfg.w;
          canvas.height = cfg.h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(url);
          const a = document.createElement("a");
          a.href = canvas.toDataURL("image/png");
          a.download = "fade.png";
          a.click();
        };
        img.src = url;
      }

      if (e.target.id === "btn-copy") {
        const ta = document.getElementById("svg-code");
        ta.select();
        navigator.clipboard.writeText(ta.value).then(() => {
          const btn = document.getElementById("btn-copy");
          btn.textContent = "コピー済";
          setTimeout(() => btn.textContent = "コピー", 1000);
        });
      }
    });

    // 初期描画
    render(cfg);
  </script>
</body>
</html>
