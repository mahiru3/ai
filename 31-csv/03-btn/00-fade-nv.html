<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fade 設定</title>
  <link rel="stylesheet" href="../../01-css/31-csv-03-btn.css" />
  <style>
    .dir-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .dir-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 5px;
      border: 1.5px solid #ddd;
      cursor: pointer;
      font-size: 12px;
      color: #555;
      transition: background .15s, border-color .15s;
    }
    .dir-label input[type="radio"] { display: none; }
    .dir-label.selected {
      background: #eef3ff;
      border-color: #4a7fd4;
      color: #1a4fa0;
      font-weight: 600;
    }
  </style>
</head>
<body class="nv-body">
  <h3>⚙ Fade 設定</h3>

  <div class="section">
    <label>塗り色</label>
    <input type="color" id="cfg-color" value="#9a4fbf" />
  </div>

  <div class="section">
    <label>フェードイン時間（秒）</label>
    <input type="range" id="cfg-duration" min="0.1" max="5" step="0.1" value="1.0" />
    <div class="val"><span id="val-duration">1.0</span> 秒</div>
  </div>

  <div class="section">
    <div class="check-row">
      <input type="checkbox" id="cfg-loop" checked />
      <label for="cfg-loop" style="margin:0">ループ再生</label>
    </div>
  </div>

  <div class="section">
    <label>方向</label>
    <div class="dir-group">
      <label class="dir-label selected" id="lbl-normal">
        <input type="radio" name="dir" value="normal" checked />
        透明 → 指定色
      </label>
      <label class="dir-label" id="lbl-reverse">
        <input type="radio" name="dir" value="reverse" />
        指定色 → 透明
      </label>
    </div>
  </div>

  <button class="btn-apply" id="btn-apply">プレビューに反映</button>

  <p class="note">
    ※ 出力サイズは 24×24px 固定です。
  </p>

  <script>
    // スライダー表示更新
    const dur = document.getElementById("cfg-duration");
    dur.addEventListener("input", () => {
      document.getElementById("val-duration").textContent = dur.value;
    });

    // ラジオ選択ハイライト
    document.querySelectorAll("input[name='dir']").forEach(radio => {
      radio.addEventListener("change", () => {
        document.getElementById("lbl-normal").classList.toggle("selected", document.querySelector("input[name='dir'][value='normal']").checked);
        document.getElementById("lbl-reverse").classList.toggle("selected", document.querySelector("input[name='dir'][value='reverse']").checked);
      });
    });

    document.getElementById("btn-apply").addEventListener("click", () => {
      const cfg = {
        color:    document.getElementById("cfg-color").value,
        duration: parseFloat(dur.value),
        loop:     document.getElementById("cfg-loop").checked,
        reverse:  document.querySelector("input[name='dir']:checked").value === "reverse",
      };
      if (parent && parent.frames && parent.frames["center"]) {
        parent.frames["center"].applyConfig(cfg);
      }
    });
  </script>
</body>
</html>
