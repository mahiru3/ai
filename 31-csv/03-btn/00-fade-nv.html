<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fade 設定</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      font-family: sans-serif;
      font-size: 13px;
      background: #fafafa;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 14px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .section {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      color: #555;
      font-size: 12px;
    }

    input[type="color"] {
      width: 100%;
      height: 32px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      padding: 2px;
      background: #fff;
    }

    input[type="range"] {
      width: 100%;
      margin: 4px 0 2px;
    }

    .val {
      text-align: right;
      color: #888;
      font-size: 11px;
    }

    button {
      width: 100%;
      padding: 7px;
      background: #4a7fd4;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #3a6fc4; }

    .note {
      margin-top: 10px;
      font-size: 11px;
      color: #999;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h3>⚙ Fade 設定</h3>

  <div class="section">
    <label>塗り色</label>
    <input type="color" id="cfg-color" value="#9a4fbf" />
  </div>

  <div class="section">
    <label>フェードイン時間（秒）</label>
    <input type="range" id="cfg-fade-in" min="0.1" max="3" step="0.1" value="0.8" />
    <div class="val"><span id="val-fade-in">0.8</span> 秒</div>
  </div>

  <div class="section">
    <label>表示キープ時間（秒）</label>
    <input type="range" id="cfg-hold" min="0.1" max="3" step="0.1" value="0.6" />
    <div class="val"><span id="val-hold">0.6</span> 秒</div>
  </div>

  <div class="section">
    <label>フェードアウト時間（秒）</label>
    <input type="range" id="cfg-fade-out" min="0.1" max="3" step="0.1" value="0.8" />
    <div class="val"><span id="val-fade-out">0.8</span> 秒</div>
  </div>

  <div class="section">
    <label>待機時間（秒）</label>
    <input type="range" id="cfg-wait" min="0.1" max="3" step="0.1" value="0.6" />
    <div class="val"><span id="val-wait">0.6</span> 秒</div>
  </div>

  <div class="section">
    <label>ボタン幅 (px)</label>
    <input type="range" id="cfg-w" min="100" max="500" step="10" value="260" />
    <div class="val"><span id="val-w">260</span> px</div>
  </div>

  <div class="section">
    <label>ボタン高さ (px)</label>
    <input type="range" id="cfg-h" min="30" max="160" step="2" value="80" />
    <div class="val"><span id="val-h">80</span> px</div>
  </div>

  <button id="btn-apply">プレビューに反映</button>

  <p class="note">
    ※ 反映ボタンで中央のプレビューが更新されます。
  </p>

  <script>
    const sliders = [
      { id: "cfg-fade-in",  val: "val-fade-in"  },
      { id: "cfg-hold",     val: "val-hold"      },
      { id: "cfg-fade-out", val: "val-fade-out"  },
      { id: "cfg-wait",     val: "val-wait"      },
      { id: "cfg-w",        val: "val-w"         },
      { id: "cfg-h",        val: "val-h"         },
    ];

    sliders.forEach(({ id, val }) => {
      const el = document.getElementById(id);
      const disp = document.getElementById(val);
      el.addEventListener("input", () => disp.textContent = el.value);
    });

    document.getElementById("btn-apply").addEventListener("click", () => {
      const cfg = {
        color:   document.getElementById("cfg-color").value,
        fadeIn:  parseFloat(document.getElementById("cfg-fade-in").value),
        hold:    parseFloat(document.getElementById("cfg-hold").value),
        fadeOut: parseFloat(document.getElementById("cfg-fade-out").value),
        wait:    parseFloat(document.getElementById("cfg-wait").value),
        w:       parseInt(document.getElementById("cfg-w").value),
        h:       parseInt(document.getElementById("cfg-h").value),
      };

      // 中央iframe（center）に設定を送る
      if (parent && parent.frames && parent.frames["center"]) {
        parent.frames["center"].applyConfig(cfg);
      }
    });
  </script>
</body>
</html>
