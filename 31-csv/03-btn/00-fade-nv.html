<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fade 設定</title>
  <link rel="stylesheet" href="../../01-css/31-csv-03-btn.css" />
</head>
<body class="nv-body">
  <h3>⚙ Fade 設定</h3>

  <div class="section">
    <label>塗り色</label>
    <input type="color" id="cfg-color" value="#9a4fbf" />
  </div>

  <div class="section">
    <label>フェードイン時間（秒）</label>
    <input type="range" id="cfg-fade-in" min="0.1" max="3" step="0.1" value="0.8" />
    <div class="val"><span id="val-fade-in">0.8</span> 秒</div>
  </div>

  <div class="section">
    <label>表示キープ時間（秒）</label>
    <input type="range" id="cfg-hold" min="0.1" max="3" step="0.1" value="0.6" />
    <div class="val"><span id="val-hold">0.6</span> 秒</div>
  </div>

  <div class="section">
    <label>フェードアウト時間（秒）</label>
    <input type="range" id="cfg-fade-out" min="0.1" max="3" step="0.1" value="0.8" />
    <div class="val"><span id="val-fade-out">0.8</span> 秒</div>
  </div>

  <div class="section">
    <label>待機時間（秒）</label>
    <input type="range" id="cfg-wait" min="0.1" max="3" step="0.1" value="0.6" />
    <div class="val"><span id="val-wait">0.6</span> 秒</div>
  </div>

  <div class="section">
    <div class="check-row">
      <input type="checkbox" id="cfg-loop" checked />
      <label for="cfg-loop" style="margin:0">ループ再生</label>
    </div>
  </div>

  <button class="btn-apply" id="btn-apply">プレビューに反映</button>
  <button class="btn-reverse" id="btn-reverse">リバース（色→透明）で反映</button>

  <p class="note">
    ※ 出力サイズは 24×24px 固定です。<br>
    ※ リバースは指定色から透明にフェードします。
  </p>

  <script>
    const sliders = [
      { id: "cfg-fade-in",  val: "val-fade-in"  },
      { id: "cfg-hold",     val: "val-hold"      },
      { id: "cfg-fade-out", val: "val-fade-out"  },
      { id: "cfg-wait",     val: "val-wait"      },
    ];
    sliders.forEach(({ id, val }) => {
      const el = document.getElementById(id);
      document.getElementById(id).addEventListener("input", () => {
        document.getElementById(val).textContent = el.value;
      });
    });

    function getConfig(reverse) {
      return {
        color:   document.getElementById("cfg-color").value,
        fadeIn:  parseFloat(document.getElementById("cfg-fade-in").value),
        hold:    parseFloat(document.getElementById("cfg-hold").value),
        fadeOut: parseFloat(document.getElementById("cfg-fade-out").value),
        wait:    parseFloat(document.getElementById("cfg-wait").value),
        loop:    document.getElementById("cfg-loop").checked,
        reverse: reverse,
      };
    }

    function send(cfg) {
      if (parent && parent.frames && parent.frames["center"]) {
        parent.frames["center"].applyConfig(cfg);
      }
    }

    document.getElementById("btn-apply").addEventListener("click", () => send(getConfig(false)));
    document.getElementById("btn-reverse").addEventListener("click", () => send(getConfig(true)));
  </script>
</body>
</html>
