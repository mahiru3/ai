<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>navi</title>
  <link rel="stylesheet" href="../../01-css/00-style.css">
  <style>
    body { margin: 0; padding: 12px; font-family: sans-serif; line-height: 1.6; }
    h2 { margin: 0 0 10px; font-size: 14px; }
    .nav-btn {
      display: block;
      width: 100%;
      padding: 8px 10px;
      margin: 6px 0;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      text-align: left;
      cursor: pointer;
      box-sizing: border-box;
    }
    .nav-btn:hover { background: #f3f7ff; border-color: #bcd3ff; }
  </style>
</head>
<body>
  <h2>いあきゃら変換</h2>

  <button class="nav-btn" onclick="triggerBtn('parseBtn')">解析（status表示）</button>
  <button class="nav-btn" onclick="triggerBtn('runBtn')">▶ 実行</button>
  <button class="nav-btn" onclick="triggerBtn('copyBtn')">📋 コピー</button>

  <script>
    function triggerBtn(id) {
      const center = parent && parent.frames && parent.frames["center"];
      if (center) {
        const btn = center.document.getElementById(id);
        if (btn) btn.click();
      }
    }
  </script>
</body>
</html>
