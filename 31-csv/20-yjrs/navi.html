<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>矢印SVG ナビ</title>
  <link rel="stylesheet" href="../../01-css/00-style.css" />
  <link rel="stylesheet" href="../../01-css/31-csv-20-yjrs.css" />
</head>
<body>
<div class="navi-wrap">

  <div class="navi-tool-title">🏹 矢印SVGジェネレーター</div>

  <!-- ▶ 調整 / プレビュー トグル -->
  <div class="mode-bar">
    <button class="mode-btn mode-adjust active" id="btnAdjust">⏸ 調整モード</button>
    <button class="mode-btn mode-preview" id="btnPreview">▶ プレビュー開始</button>
  </div>

  <!-- ① 全体設定 -->
  <details class="navi-acc navi-acc-1" open>
    <summary>① 全体設定</summary>
    <div class="navi-acc-body">

      <div class="ctrl-section-title">キャンバス</div>
      <div class="ctrl-row">
        <span class="ctrl-label">幅</span>
        <input type="range"  id="cvW"  min="200" max="800" step="10" value="480" />
        <input type="number" id="cvWN" min="200" max="800" step="10" value="480" class="num-input" />
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">高さ</span>
        <input type="range"  id="cvH"  min="200" max="800" step="10" value="480" />
        <input type="number" id="cvHN" min="200" max="800" step="10" value="480" class="num-input" />
      </div>

      <div class="ctrl-section-title">色</div>
      <div class="ctrl-row">
        <span class="ctrl-label">背景色</span>
        <input type="color" id="bgColor" value="#0a0a0f" />
        <input type="text"  id="bgColorN" value="#0a0a0f" class="hex-input" maxlength="7" />
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">矢印色</span>
        <input type="color" id="arrowColor" value="#00ffcc" />
        <input type="text"  id="arrowColorN" value="#00ffcc" class="hex-input" maxlength="7" />
      </div>

      <div class="ctrl-section-title">矢印の形（X座標）</div>
      <div class="ctrl-row">
        <span class="ctrl-label">左端 X</span>
        <input type="range"  id="xLeft"  min="0" max="400" step="5" value="100" />
        <input type="number" id="xLeftN" min="0" max="400" step="5" value="100" class="num-input" />
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">右端 X</span>
        <input type="range"  id="xRight"  min="100" max="800" step="5" value="380" />
        <input type="number" id="xRightN" min="100" max="800" step="5" value="380" class="num-input" />
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">頂点 X</span>
        <input type="range"  id="xMid"  min="50" max="750" step="5" value="240" />
        <input type="number" id="xMidN" min="50" max="750" step="5" value="240" class="num-input" />
      </div>

      <div class="ctrl-section-title">アニメーション速度</div>
      <div class="ctrl-row">
        <span class="ctrl-label">周期 (秒)</span>
        <input type="range"  id="dur"  min="0.5" max="6" step="0.1" value="2.4" />
        <input type="number" id="durN" min="0.5" max="6" step="0.1" value="2.4" class="num-input" />
      </div>

    </div>
  </details>

  <!-- ② 矢印ごとの設定 -->
  <details class="navi-acc navi-acc-2" open>
    <summary>② 矢印ごとの設定</summary>
    <div class="navi-acc-body">
      <p class="navi-hint">V1=上（点滅） / V4=下（常時表示）<br>↕行間 = V同士の上端Y差</p>
      <div id="arrowSettings"><!-- JS生成 --></div>
    </div>
  </details>

  <!-- ③ コード出力へ -->
  <details class="navi-acc navi-acc-3">
    <summary>③ コード出力・DL</summary>
    <div class="navi-acc-body">
      SVGコードのコピー・.svgダウンロード<br>
      <a class="navi-link" href="index.html" target="center"
         onclick="openAccInCenter('acc-code')">▶ コード出力を開く</a>
    </div>
  </details>

  <p class="navi-note">※サーバー送信なし・完全ローカル処理</p>

</div>
<script>
/* =============================================
   navi.html — 設定パネル
   ① 全スライダー操作ではSVG属性を書き換えるだけ（再insertしない）
      → postMessage type:"yjrs-update"
   ② pause/resume は独立したメッセージ
      → postMessage type:"yjrs-pause" / "yjrs-resume"
   ③ スライダーと数値inputを双方向連動
   ============================================= */

// ---- state ----
const DEFAULTS = {
  cvW: 480, cvH: 480,
  bgColor: "#0a0a0f", arrowColor: "#00ffcc",
  xLeft: 100, xRight: 380, xMid: 240,
  dur: 2.4,
  v: [
    { sw: 30, glow: 6,  tipOffset: 50 },
    { sw: 35, glow: 7,  tipOffset: 50 },
    { sw: 40, glow: 9,  tipOffset: 50 },
    { sw: 60, glow: 12, tipOffset: 70 },
  ],
  yStart: 110,
  gaps: [65, 75, 90],
};
let state = JSON.parse(JSON.stringify(DEFAULTS));
let isPreviewing = false; // false=調整モード / true=プレビューモード

// ---- Y座標計算 ----
function calcArrows() {
  const arr = [];
  let yTop = state.yStart;
  for (let i = 0; i < 4; i++) {
    const v = state.v[i];
    arr.push({ yTop, yTip: yTop + v.tipOffset, sw: v.sw, glow: v.glow });
    if (i < 3) yTop += state.gaps[i];
  }
  return arr;
}

// ---- center iframe 取得 ----
function getCenter() {
  return parent && parent.frames && parent.frames["center"];
}

// ---- メッセージ送信 ----
function sendUpdate() {
  const center = getCenter();
  if (!center) return;
  center.postMessage({
    type: "yjrs-update",
    state: {
      cvW: state.cvW, cvH: state.cvH,
      bgColor: state.bgColor, arrowColor: state.arrowColor,
      xLeft: state.xLeft, xRight: state.xRight, xMid: state.xMid,
      dur: state.dur,
      arrows: calcArrows()
    }
  }, "*");
}
function sendPause()  { const c = getCenter(); if (c) c.postMessage({ type:"yjrs-pause"  }, "*"); }
function sendResume() { const c = getCenter(); if (c) c.postMessage({ type:"yjrs-resume" }, "*"); }

// ---- state変更（adjustモードでもsendUpdateだけ。pause/resumeは別） ----
function onChange(updateFn) {
  updateFn();
  sendUpdate();
  // 調整モード中は pause を都度送る必要はない（index側が状態保持）
}

// ---- モードボタン ----
const btnAdjust  = document.getElementById("btnAdjust");
const btnPreview = document.getElementById("btnPreview");

btnAdjust.addEventListener("click", () => {
  isPreviewing = false;
  btnAdjust.classList.add("active");
  btnPreview.classList.remove("active");
  sendPause();
});
btnPreview.addEventListener("click", () => {
  isPreviewing = true;
  btnPreview.classList.add("active");
  btnAdjust.classList.remove("active");
  sendResume();
});

// =============================================
//  スライダー ↔ 数値input 双方向バインド
// =============================================

// range+number のペアをバインド。setter はstate更新関数
function bindPair(rangeId, numberId, setter) {
  const rng = document.getElementById(rangeId);
  const num = document.getElementById(numberId);
  if (!rng || !num) return;

  rng.addEventListener("input", () => {
    const v = Number(rng.value);
    num.value = v;
    onChange(() => setter(v));
  });
  num.addEventListener("change", () => {
    const v = clamp(Number(num.value), Number(num.min), Number(num.max));
    num.value = v;
    rng.value = v;
    onChange(() => setter(v));
  });
}

// color picker + hex text のペアをバインド
function bindColorPair(pickerId, textId, setter) {
  const picker = document.getElementById(pickerId);
  const text   = document.getElementById(textId);
  if (!picker || !text) return;

  picker.addEventListener("input", () => {
    text.value = picker.value;
    onChange(() => setter(picker.value));
  });
  text.addEventListener("change", () => {
    const v = text.value.trim();
    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
      picker.value = v;
      onChange(() => setter(v));
    } else {
      text.value = picker.value; // 不正なら戻す
    }
  });
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, isNaN(v) ? min : v)); }

// =============================================
//  矢印ごとの設定 UI（動的生成）
// =============================================
function buildArrowSettings() {
  const wrap = document.getElementById("arrowSettings");
  wrap.innerHTML = "";

  // 全体のY開始位置
  const yBlock = document.createElement("div");
  yBlock.className = "arrow-block";
  yBlock.innerHTML = `
    <div class="arrow-block-title">全体の位置</div>
    <div class="ctrl-row">
      <span class="ctrl-label">開始Y（V1上端）</span>
      <input type="range"  id="yStart"  min="0" max="400" step="5" value="${state.yStart}" />
      <input type="number" id="yStartN" min="0" max="400" step="5" value="${state.yStart}" class="num-input" />
    </div>
  `;
  wrap.appendChild(yBlock);

  // V1〜V4
  for (let i = 0; i < 4; i++) {
    const isV4 = i === 3;
    const v = state.v[i];
    const g = state.gaps[i] ?? null;

    const block = document.createElement("div");
    block.className = "arrow-block";
    block.innerHTML = `
      <div class="arrow-block-title">V${i+1}${isV4 ? " ★常時表示" : ""}</div>
      <div class="ctrl-row">
        <span class="ctrl-label">線幅</span>
        <input type="range"  class="av" data-i="${i}" data-k="sw" min="4" max="100" step="1" value="${v.sw}" />
        <input type="number" class="an" data-i="${i}" data-k="sw" min="4" max="100" step="1" value="${v.sw}" class="num-input" />
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">頂点の深さ</span>
        <input type="range"  class="av" data-i="${i}" data-k="tipOffset" min="10" max="200" step="5" value="${v.tipOffset}" />
        <input type="number" class="an" data-i="${i}" data-k="tipOffset" min="10" max="200" step="5" value="${v.tipOffset}" class="num-input" />
      </div>
      <div class="ctrl-row">
        <span class="ctrl-label">グロー</span>
        <input type="range"  class="av" data-i="${i}" data-k="glow" min="1" max="30" step="1" value="${v.glow}" />
        <input type="number" class="an" data-i="${i}" data-k="glow" min="1" max="30" step="1" value="${v.glow}" class="num-input" />
      </div>
      ${!isV4 ? `
      <div class="ctrl-row gap-row">
        <span class="ctrl-label">↕ V${i+1}→V${i+2} 行間</span>
        <input type="range"  class="ag" data-gi="${i}" min="10" max="200" step="5" value="${g}" />
        <input type="number" class="agn" data-gi="${i}" min="10" max="200" step="5" value="${g}" class="num-input" />
      </div>` : ""}
    `;
    wrap.appendChild(block);
  }

  // ---- イベント委譲 ----
  // スライダー → 数値、state更新
  wrap.addEventListener("input", e => {
    const el = e.target;

    // V設定スライダー
    if (el.classList.contains("av")) {
      const i = +el.dataset.i, k = el.dataset.k;
      const v = Number(el.value);
      // 対応numberを更新
      wrap.querySelector(`.an[data-i="${i}"][data-k="${k}"]`).value = v;
      onChange(() => { state.v[i][k] = v; });
    }

    // ギャップスライダー
    if (el.classList.contains("ag")) {
      const gi = +el.dataset.gi;
      const v  = Number(el.value);
      wrap.querySelector(`.agn[data-gi="${gi}"]`).value = v;
      onChange(() => { state.gaps[gi] = v; });
    }

    // yStart スライダー
    if (el.id === "yStart") {
      document.getElementById("yStartN").value = el.value;
      onChange(() => { state.yStart = Number(el.value); });
    }
  });

  // 数値 → スライダー、state更新
  wrap.addEventListener("change", e => {
    const el = e.target;

    // V設定 number
    if (el.classList.contains("an")) {
      const i = +el.dataset.i, k = el.dataset.k;
      const v = clamp(Number(el.value), Number(el.min), Number(el.max));
      el.value = v;
      wrap.querySelector(`.av[data-i="${i}"][data-k="${k}"]`).value = v;
      onChange(() => { state.v[i][k] = v; });
    }

    // ギャップ number
    if (el.classList.contains("agn")) {
      const gi = +el.dataset.gi;
      const v  = clamp(Number(el.value), Number(el.min), Number(el.max));
      el.value = v;
      wrap.querySelector(`.ag[data-gi="${gi}"]`).value = v;
      onChange(() => { state.gaps[gi] = v; });
    }

    // yStart number
    if (el.id === "yStartN") {
      const v = clamp(Number(el.value), 0, 400);
      el.value = v;
      document.getElementById("yStart").value = v;
      onChange(() => { state.yStart = v; });
    }
  });
}

// ---- グローバルバインド ----
bindPair("cvW",  "cvWN",  v => state.cvW  = v);
bindPair("cvH",  "cvHN",  v => state.cvH  = v);
bindPair("xLeft","xLeftN",v => state.xLeft = v);
bindPair("xRight","xRightN",v => state.xRight = v);
bindPair("xMid", "xMidN", v => state.xMid  = v);
bindPair("dur",  "durN",  v => state.dur   = v);
bindColorPair("bgColor",   "bgColorN",   v => state.bgColor    = v);
bindColorPair("arrowColor","arrowColorN",v => state.arrowColor = v);

// ---- 初期化 ----
buildArrowSettings();

window.addEventListener("load", () => {
  setTimeout(() => {
    sendUpdate(); // 初回描画
    sendPause();  // 初期は調整モード
  }, 300);
});

// ---- naviからcenterのアコーディオンを開く ----
function openAccInCenter(accId) {
  const center = getCenter();
  if (!center) return;
  setTimeout(() => {
    try { if (center.openAccordion) center.openAccordion(accId); } catch(e){}
  }, 400);
}
</script>
</body>
</html>
