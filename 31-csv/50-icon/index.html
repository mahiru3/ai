<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>アイコンSVGジェネレーター①</title>
  <link rel="stylesheet" href="../../01-css/00-style.css" />
  <link rel="stylesheet" href="../../01-css/31-csv-50-icon.css" />
</head>
<body>
<div class="page-wrap icon-page">

  <h1 class="page-title">✅ アイコンSVGジェネレーター</h1>
  <p class="page-subtitle">左パネルで調整 → リアルタイムプレビュー。SVG / PNG / APNG をダウンロードできます。</p>

  <!-- ① プレビュー -->
  <details class="accordion-008 acc-color-1" id="acc-preview" open>
    <summary>① プレビュー</summary>
    <div class="accordion-body">
      <div class="preview-hint visible" id="previewHint">⏸ 調整モード中 — 左パネルの「▶ プレビュー開始」でアニメーション確認</div>
      <div class="preview-area">
        <div class="icon-preview-stage">
          <div class="svg-preview-wrap" id="previewWrap">
            <div class="preview-empty">左パネルで設定してください</div>
          </div>
        </div>
        <div class="preview-meta" id="previewMeta">120 × 120 / SVG</div>
      </div>
    </div>
  </details>

  <!-- ② SVGコード -->
  <details class="accordion-008 acc-color-2" id="acc-code">
    <summary>② SVGコード・SVGダウンロード</summary>
    <div class="accordion-body">
      <div class="menu-btn-row">
        <button class="menu-btn primary" id="btnCopy">📋 SVGコードをコピー</button>
        <button class="menu-btn dl" id="btnSVG">💾 .svgダウンロード</button>
      </div>
      <div class="status-msg" id="codeStatus"></div>
      <pre class="code-output" id="codeOutput">← 左パネルで設定するとここに反映されます</pre>
    </div>
  </details>

  <!-- ③ PNG / APNG -->
  <details class="accordion-008 acc-color-3" id="acc-image">
    <summary>③ PNG / APNG ダウンロード</summary>
    <div class="accordion-body">
      <div class="menu-btn-row">
        <button class="menu-btn dl" id="btnPNG">🖼 PNGダウンロード</button>
        <button class="menu-btn dl" id="btnAPNG">🎞 APNGダウンロード</button>
      </div>
      <div class="status-msg" id="imageStatus"></div>
      <p class="output-note">
        PNGは現在の見た目を静止画として保存します。APNGは選択中のアニメーションを短いループ画像として保存します。
      </p>
    </div>
  </details>

</div>

<script>
/* =============================================
   31-csv/50-icon/index.html
   役割：中央iframe側。プレビュー、SVGコード、SVG/PNG/APNG出力。
   注意：フレーム枠は親ページが担当するため、このファイル内では作らない。
   ============================================= */

const DEFAULTS = {
  size: 120,
  bgTransparent: false,
  pageBg: "#eef3f7",
  tileColor: "#e8edf2",
  lightShadow: "#ffffff",
  darkShadow: "#b8c2cc",
  rounded: 24,
  shadowOffset: 4,
  shadowBlur: 8,

  text: "成功",
  textColor: "#25633f",
  fontSize: 30,
  fontWeight: "800",
  fontFamily: "\"Noto Sans JP\",\"Hiragino Sans\",\"Yu Gothic\",\"Meiryo\",sans-serif",
  textX: 60,
  textY: 62,

  accentColor: "#58c987",
  accentOpacity: 0.95,
  glow: 2,

  animationType: "ring-rotate",
  duration: 1.8,
  direction: "cw",

  ringRadius: 43,
  ringWidth: 7,
  ringDash: 190,
  ringGap: 75,

  shapeType: "circle",
  shapeX: 60,
  shapeY: 60,
  shapeSize: 74,

  pointX: 88,
  pointY: 88,
  pointStartSize: 3,
  pointEndRadius: 38,
  pointLineWidth: 7,

  fps: 12,
  apngSeconds: 1.8
};

let state = {...DEFAULTS};
let currentSVG = "";
let isPaused = true;

function esc(s) {
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}
function num(v, fallback=0) {
  const n = Number(v);
  return Number.isFinite(n) ? n : fallback;
}
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function shapePathMarkup(s) {
  const size = num(s.shapeSize, 74);
  const x = num(s.shapeX, s.size / 2);
  const y = num(s.shapeY, s.size / 2);
  const color = esc(s.accentColor);
  const op = clamp(num(s.accentOpacity, .95), 0, 1);
  const half = size / 2;
  const sw = Math.max(2, Math.round(size / 14));
  const common = `fill="${color}" fill-opacity="${Math.min(op, 0.18)}" stroke="${color}" stroke-opacity="${op}" stroke-width="${sw}"`;

  if (s.shapeType === "square") {
    return `<rect x="${x-half}" y="${y-half}" width="${size}" height="${size}" ${common}/>`;
  }
  if (s.shapeType === "round-square") {
    return `<rect x="${x-half}" y="${y-half}" width="${size}" height="${size}" rx="${Math.max(4, size*.18)}" ${common}/>`;
  }
  if (s.shapeType === "diamond") {
    return `<path d="M ${x},${y-half} L ${x+half},${y} L ${x},${y+half} L ${x-half},${y} Z" ${common}/>`;
  }
  if (s.shapeType === "hexagon") {
    const pts = [];
    for (let i=0; i<6; i++) {
      const a = (-90 + i*60) * Math.PI / 180;
      pts.push(`${x + half*Math.cos(a)},${y + half*Math.sin(a)}`);
    }
    return `<polygon points="${pts.join(" ")}" ${common}/>`;
  }
  if (s.shapeType === "star") {
    const pts = [];
    for (let i=0; i<10; i++) {
      const r = i % 2 === 0 ? half : half * .45;
      const a = (-90 + i*36) * Math.PI / 180;
      pts.push(`${x + r*Math.cos(a)},${y + r*Math.sin(a)}`);
    }
    return `<polygon points="${pts.join(" ")}" ${common}/>`;
  }
  if (s.shapeType === "check") {
    const checkSw = Math.max(7, size * .16);
    return `<path d="M ${x-half*.55},${y+half*.02} L ${x-half*.16},${y+half*.39} L ${x+half*.58},${y-half*.42}" fill="none" stroke="${color}" stroke-opacity="${op}" stroke-width="${checkSw}" stroke-linecap="round" stroke-linejoin="round"/>`;
  }
  if (s.shapeType === "heart") {
    const sc = size / 100;
    const d = [
      `M ${x},${y+30*sc}`,
      `C ${x-52*sc},${y-5*sc} ${x-42*sc},${y-42*sc} ${x-18*sc},${y-42*sc}`,
      `C ${x-4*sc},${y-42*sc} ${x},${y-30*sc} ${x},${y-24*sc}`,
      `C ${x},${y-30*sc} ${x+4*sc},${y-42*sc} ${x+18*sc},${y-42*sc}`,
      `C ${x+42*sc},${y-42*sc} ${x+52*sc},${y-5*sc} ${x},${y+30*sc}`,
      "Z"
    ].join(" ");
    return `<path d="${d}" ${common}/>`;
  }
  return `<circle cx="${x}" cy="${y}" r="${half}" ${common}/>`;
}

function buildCenterPop(s, progress=0, animated=true) {
  const x = num(s.shapeX, s.size / 2);
  const y = num(s.shapeY, s.size / 2);
  const shape = shapePathMarkup(s);
  if (animated) {
    return `<g transform-origin="${x}px ${y}px">
      ${shape}
      <animateTransform attributeName="transform" type="scale" values="0.04;1;1" keyTimes="0;0.55;1" dur="${num(s.duration,1.8)}s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;1;1" keyTimes="0;0.55;1" dur="${num(s.duration,1.8)}s" repeatCount="indefinite"/>
    </g>`;
  }
  const p = progress < .55 ? progress / .55 : 1;
  const scale = 0.04 + p * 0.96;
  return `<g transform="translate(${x} ${y}) scale(${scale}) translate(${-x} ${-y})">${shape}</g>`;
}

function buildPointCircle(s, progress=0, animated=true) {
  const color = esc(s.accentColor);
  const op = clamp(num(s.accentOpacity, .95), 0, 1);
  const dur = num(s.duration, 1.8);
  const px = num(s.pointX, 88);
  const py = num(s.pointY, 88);
  const start = num(s.pointStartSize, 3);
  const end = num(s.pointEndRadius, 38);
  const sw = num(s.pointLineWidth, 7);

  if (animated) {
    return `<circle cx="${px}" cy="${py}" r="${start}" fill="none" stroke="${color}" stroke-opacity="${op}" stroke-width="${sw}">
      <animate attributeName="r" values="${start};${end};${end}" keyTimes="0;0.58;1" dur="${dur}s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;1;1" keyTimes="0;0.58;1" dur="${dur}s" repeatCount="indefinite"/>
    </circle>
    <circle cx="${px}" cy="${py}" r="${start}" fill="${color}" fill-opacity="${op}">
      <animate attributeName="opacity" values="1;0;0" keyTimes="0;0.35;1" dur="${dur}s" repeatCount="indefinite"/>
    </circle>`;
  }

  const p = progress < .58 ? progress / .58 : 1;
  const r = start + (end - start) * p;
  const dotOpacity = progress < .35 ? 1 - progress / .35 : 0;
  return `<circle cx="${px}" cy="${py}" r="${r}" fill="none" stroke="${color}" stroke-opacity="${op}" stroke-width="${sw}"/>
  <circle cx="${px}" cy="${py}" r="${start}" fill="${color}" fill-opacity="${dotOpacity}"/>`;
}

function buildRingRotate(s, progress=0, animated=true) {
  const cx = s.size / 2;
  const cy = s.size / 2;
  const color = esc(s.accentColor);
  const op = clamp(num(s.accentOpacity, .95), 0, 1);
  const dur = num(s.duration, 1.8);
  const dir = s.direction === "ccw" ? -1 : 1;
  const radius = num(s.ringRadius, 43);
  const width = num(s.ringWidth, 7);
  const dash = num(s.ringDash, 190);
  const gap = num(s.ringGap, 75);

  const ring = `<circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${color}" stroke-opacity="${Math.min(op, .18)}" stroke-width="${width}"/>
  <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="${color}" stroke-opacity="${op}" stroke-width="${width}" stroke-linecap="round" stroke-dasharray="${dash} ${gap}" transform="rotate(-90 ${cx} ${cy})"/>`;

  if (animated) {
    return `<g transform-origin="${cx}px ${cy}px">
      ${ring}
      <animateTransform attributeName="transform" type="rotate" from="0 ${cx} ${cy}" to="${dir*360} ${cx} ${cy}" dur="${dur}s" repeatCount="indefinite"/>
    </g>`;
  }
  return `<g transform="rotate(${dir * 360 * progress} ${cx} ${cy})">${ring}</g>`;
}

function buildAnimationMarkup(s, progress=0, animated=true) {
  if (s.animationType === "center-pop") return buildCenterPop(s, progress, animated);
  if (s.animationType === "point-circle") return buildPointCircle(s, progress, animated);
  return buildRingRotate(s, progress, animated);
}

function buildSVGText(rawState, opt={}) {
  const s = {...DEFAULTS, ...rawState};
  const size = clamp(num(s.size, 120), 40, 512);
  s.size = size;
  const animated = opt.animated ?? true;
  const progress = opt.progress ?? 0;
  const tilePad = Math.max(6, Math.round(size * 0.08));
  const tileSize = size - tilePad * 2;

  const bg = s.bgTransparent ? "" : `<rect width="${size}" height="${size}" fill="${esc(s.pageBg)}"/>`;

  const defs = `<filter id="neuShadow" x="-40%" y="-40%" width="180%" height="180%">
    <feDropShadow dx="${-num(s.shadowOffset,4)}" dy="${-num(s.shadowOffset,4)}" stdDeviation="${num(s.shadowBlur,8)}" flood-color="${esc(s.lightShadow)}" flood-opacity="0.9"/>
    <feDropShadow dx="${num(s.shadowOffset,4)}" dy="${num(s.shadowOffset,4)}" stdDeviation="${num(s.shadowBlur,8)}" flood-color="${esc(s.darkShadow)}" flood-opacity="0.75"/>
  </filter>
  <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="${num(s.glow,2)}" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>`;

  const anim = buildAnimationMarkup(s, progress, animated);
  const text = `<text x="${num(s.textX, size/2)}" y="${num(s.textY, size/2)}"
    text-anchor="middle" dominant-baseline="middle"
    fill="${esc(s.textColor)}"
    font-size="${num(s.fontSize,30)}"
    font-weight="${esc(s.fontWeight)}"
    font-family="${esc(s.fontFamily)}"
    letter-spacing="0.02em">${esc(s.text)}</text>`;

  return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
  <defs>
    ${defs}
  </defs>
  ${bg}
  <rect x="${tilePad}" y="${tilePad}" width="${tileSize}" height="${tileSize}" rx="${num(s.rounded,24)}" fill="${esc(s.tileColor)}" filter="url(#neuShadow)"/>
  <g filter="url(#softGlow)">
    ${anim}
  </g>
  ${text}
</svg>`;
}

function render() {
  currentSVG = buildSVGText(state, {animated: !isPaused, progress: 0.72});
  document.getElementById("previewWrap").innerHTML = currentSVG;
  document.getElementById("codeOutput").textContent = currentSVG;
  document.getElementById("previewMeta").textContent = `${state.size} × ${state.size} / ${state.animationType}`;
  applyPause();
}

function applyPause() {
  const svg = document.querySelector("#previewWrap svg");
  if (svg) {
    if (isPaused && svg.pauseAnimations) svg.pauseAnimations();
    if (!isPaused && svg.unpauseAnimations) svg.unpauseAnimations();
  }
  document.getElementById("previewHint").classList.toggle("visible", isPaused);
}

window.addEventListener("message", e => {
  const msg = e.data;
  if (!msg) return;

  if (msg.type === "icon-update") {
    state = {...DEFAULTS, ...msg.state};
    render();
  }
  if (msg.type === "icon-pause") {
    isPaused = true;
    render();
  }
  if (msg.type === "icon-resume") {
    isPaused = false;
    render();
  }
});

function showStatus(target, type, msg) {
  const el = document.getElementById(target);
  el.textContent = msg;
  el.className = `status-msg show ${type}`;
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement("a"), { href: url, download: filename });
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 800);
}
function safeFileName(ext) {
  const raw = (state.text || "icon").replace(/[\\/:*?"<>|\s]+/g, "_").slice(0, 24);
  return `${raw || "icon"}_${state.animationType}.${ext}`;
}

document.getElementById("btnCopy").addEventListener("click", () => {
  if (!currentSVG) render();
  navigator.clipboard.writeText(currentSVG)
    .then(() => showStatus("codeStatus", "ok", "SVGコードをコピーしました"))
    .catch(() => showStatus("codeStatus", "err", "コピー失敗。手動でコピーしてください"));
});

document.getElementById("btnSVG").addEventListener("click", () => {
  if (!currentSVG) render();
  downloadBlob(new Blob([currentSVG], {type:"image/svg+xml;charset=utf-8"}), safeFileName("svg"));
  showStatus("codeStatus", "ok", "SVGをダウンロードしました");
});

async function svgToCanvas(svgText, size) {
  const blob = new Blob([svgText], {type:"image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
    img.src = url;
  });
  ctx.clearRect(0, 0, size, size);
  ctx.drawImage(img, 0, 0, size, size);
  URL.revokeObjectURL(url);
  return canvas;
}
function canvasToBlob(canvas, type="image/png") {
  return new Promise(resolve => canvas.toBlob(resolve, type));
}

document.getElementById("btnPNG").addEventListener("click", async () => {
  try {
    const size = clamp(num(state.size, 120), 40, 512);
    const svg = buildSVGText(state, {animated:false, progress:.72});
    const canvas = await svgToCanvas(svg, size);
    const blob = await canvasToBlob(canvas, "image/png");
    downloadBlob(blob, safeFileName("png"));
    showStatus("imageStatus", "ok", "PNGをダウンロードしました");
  } catch (err) {
    console.error(err);
    showStatus("imageStatus", "err", "PNG作成に失敗しました");
  }
});

/* =============================================
   APNG生成：PNGフレームをAPNGチャンクへ組み立て
   ============================================= */
const PNG_SIG = new Uint8Array([137,80,78,71,13,10,26,10]);

function makeCRCTable() {
  const table = new Uint32Array(256);
  for (let n=0; n<256; n++) {
    let c = n;
    for (let k=0; k<8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
    table[n] = c >>> 0;
  }
  return table;
}
const CRC_TABLE = makeCRCTable();

function crc32(bytes) {
  let c = 0xffffffff;
  for (let i=0; i<bytes.length; i++) c = CRC_TABLE[(c ^ bytes[i]) & 0xff] ^ (c >>> 8);
  return (c ^ 0xffffffff) >>> 0;
}
function u32(n) {
  return new Uint8Array([(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255]);
}
function writeU32(arr, off, n) {
  arr[off]=(n>>>24)&255; arr[off+1]=(n>>>16)&255; arr[off+2]=(n>>>8)&255; arr[off+3]=n&255;
}
function writeU16(arr, off, n) {
  arr[off]=(n>>>8)&255; arr[off+1]=n&255;
}
function ascii(s) {
  return new Uint8Array([...s].map(ch => ch.charCodeAt(0)));
}
function concatBytes(parts) {
  const len = parts.reduce((a,b)=>a+b.length,0);
  const out = new Uint8Array(len);
  let o = 0;
  for (const p of parts) { out.set(p, o); o += p.length; }
  return out;
}
function makeChunk(type, data) {
  const t = ascii(type);
  const body = concatBytes([t, data]);
  return concatBytes([u32(data.length), body, u32(crc32(body))]);
}
function parsePNG(buf) {
  const bytes = new Uint8Array(buf);
  const chunks = [];
  let off = 8;
  while (off < bytes.length) {
    const len = (bytes[off]<<24) | (bytes[off+1]<<16) | (bytes[off+2]<<8) | bytes[off+3];
    const type = String.fromCharCode(bytes[off+4], bytes[off+5], bytes[off+6], bytes[off+7]);
    const data = bytes.slice(off+8, off+8+len);
    chunks.push({type, data});
    off += 12 + len;
    if (type === "IEND") break;
  }
  return chunks;
}
function makeFCTL(seq, width, height, delayNum, delayDen) {
  const d = new Uint8Array(26);
  writeU32(d,0,seq);
  writeU32(d,4,width);
  writeU32(d,8,height);
  writeU32(d,12,0);
  writeU32(d,16,0);
  writeU16(d,20,delayNum);
  writeU16(d,22,delayDen);
  d[24]=1; // dispose_op: background
  d[25]=0; // blend_op: source
  return d;
}
function makeFDAT(seq, idatData) {
  const d = new Uint8Array(4 + idatData.length);
  writeU32(d,0,seq);
  d.set(idatData,4);
  return d;
}
async function pngFrameAt(progress) {
  const size = clamp(num(state.size, 120), 40, 512);
  const svg = buildSVGText(state, {animated:false, progress});
  const canvas = await svgToCanvas(svg, size);
  const blob = await canvasToBlob(canvas, "image/png");
  return await blob.arrayBuffer();
}
async function buildAPNG() {
  const size = clamp(num(state.size, 120), 40, 512);
  const fps = clamp(num(state.fps, 12), 4, 24);
  const seconds = clamp(num(state.apngSeconds || state.duration, state.duration), 0.5, 4);
  const frameCount = Math.max(4, Math.round(fps * seconds));
  const delayNum = Math.max(1, Math.round(1000 / fps));
  const delayDen = 1000;

  const frames = [];
  for (let i=0; i<frameCount; i++) {
    const progress = i / frameCount;
    const buf = await pngFrameAt(progress);
    frames.push(parsePNG(buf));
  }

  const ihdr = frames[0].find(c => c.type === "IHDR").data;
  const parts = [
    PNG_SIG,
    makeChunk("IHDR", ihdr),
    makeChunk("acTL", concatBytes([u32(frameCount), u32(0)]))
  ];

  let seq = 0;
  frames.forEach((chunks, frameIndex) => {
    const idats = chunks.filter(c => c.type === "IDAT").map(c => c.data);
    parts.push(makeChunk("fcTL", makeFCTL(seq++, size, size, delayNum, delayDen)));
    if (frameIndex === 0) {
      idats.forEach(data => parts.push(makeChunk("IDAT", data)));
    } else {
      idats.forEach(data => parts.push(makeChunk("fdAT", makeFDAT(seq++, data))));
    }
  });

  parts.push(makeChunk("IEND", new Uint8Array()));
  return new Blob([concatBytes(parts)], {type:"image/png"});
}

document.getElementById("btnAPNG").addEventListener("click", async () => {
  try {
    showStatus("imageStatus", "ok", "APNGを作成中です…");
    const blob = await buildAPNG();
    downloadBlob(blob, safeFileName("apng.png"));
    showStatus("imageStatus", "ok", "APNGをダウンロードしました");
  } catch (err) {
    console.error(err);
    showStatus("imageStatus", "err", "APNG作成に失敗しました");
  }
});

function openAccordion(id) {
  const el = document.getElementById(id);
  if (el) { el.setAttribute("open",""); el.scrollIntoView({behavior:"smooth",block:"start"}); }
}

// 中央だけ単独で開いた場合の初期表示
window.addEventListener("load", () => {
  setTimeout(() => render(), 100);
});
</script>
</body>
</html>
