<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>黒板チョーク風</title>
  <style>
    body { margin: 0; padding: 16px; font-family: sans-serif; background: #1a2a1a; color: #ddd; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    textarea {
      width: 100%; box-sizing: border-box;
      min-height: 120px; padding: 10px;
      background: #1b402d; color: #fff;
      border: 1px solid #3a6a4a; border-radius: 6px;
      font-size: 16px; font-family: inherit;
      resize: vertical;
    }
    .btn-row { margin: 10px 0; display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      padding: 8px 20px; border-radius: 6px; border: none;
      font-size: 14px; cursor: pointer; font-weight: bold;
    }
    #genBtn  { background: #4a9a5a; color: #fff; }
    #genBtn:hover  { background: #3a8a4a; }
    #dlBtn   { background: #5a7aaa; color: #fff; }
    #dlBtn:hover   { background: #4a6a9a; }
    #dlBtn:disabled { background: #444; color: #888; cursor: default; }
    #status { font-size: 13px; color: #aaa; margin: 4px 0; min-height: 20px; }
    #previewWrap {
      width: 100%; border: 1px solid #3a5a3a;
      border-radius: 6px; overflow: hidden;
      background: #000; position: relative;
    }
    #preview { transform-origin: top left; }
  </style>
</head>
<body>

<h1>🧪 黒板チョーク風SVGジェネレーター</h1>
<textarea id="textInput">ここに文字をうって生成すればいいよ
　　　改行もそのまま反映されるよ。</textarea>

<div class="btn-row">
  <button id="genBtn">▶ 生成</button>
  <button id="dlBtn" disabled>💾 ダウンロード</button>
</div>
<div id="status"></div>

<div id="previewWrap">
  <div id="preview"></div>
</div>

<script>
  let cfg = {
    fontSize:   44,
    lineH:      null,
    fontFamily: '"Noto Sans JP","Hiragino Sans","Yu Gothic Medium","Yu Gothic","Meiryo",sans-serif',
    textColor:  '#ffffff',
    boardColor0:'#173628',
    boardColor1:'#1b402d',
    boardColor2:'#123021',
    baseDur:    0.18,
    animDur:    0.45,
    rise:       10,
    marginX:    120,
    marginY:    160,
  };

  let lastSvg = '';  // 最後に生成したSVG文字列を保持

  window.addEventListener('message', e => {
    if (e.data && e.data.type === 'kkbnCfg') {
      cfg = Object.assign(cfg, e.data.cfg);
      generate();
    }
  });

  function scalePreview() {
    const wrap = document.getElementById('previewWrap');
    const prev = document.getElementById('preview');
    const svg  = prev.querySelector('svg');
    if (!svg) return;
    const svgW = Number(svg.getAttribute('width')) || 1600;
    const svgH = Number(svg.getAttribute('height')) || 900;
    const scale = Math.min(1, (wrap.offsetWidth - 4) / svgW);
    prev.style.transformOrigin = 'top left';
    prev.style.transform = `scale(${scale})`;
    prev.style.width  = svgW + 'px';
    prev.style.height = svgH + 'px';
    wrap.style.height = (svgH * scale) + 'px';
  }

  function buildSvg(text) {
    const lines  = text.split(/\n/);
    const W = 1600, H = 900;
    const FONT_SIZE  = cfg.fontSize;
    const LINE_H     = cfg.lineH || Math.round(FONT_SIZE * 1.6);
    const MARGIN_X   = cfg.marginX;
    const MARGIN_Y   = cfg.marginY;
    const BASE_DELAY = cfg.baseDur;
    const DUR        = cfg.animDur;
    const RISE       = cfg.rise;

    // テキスト要素を組み立て（XSS対策：< > & をエスケープ）
    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    const textElems = lines.map((line, i) => {
      const y     = MARGIN_Y + i * LINE_H;
      const begin = `${(i * BASE_DELAY).toFixed(2)}s`;
      return `  <text class="chalkText" x="${MARGIN_X}" y="${y}" opacity="0">${esc(line)}
    <animate attributeName="opacity" from="0" to="1" dur="${DUR}s" begin="${begin}" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0,${RISE}" to="0,0" dur="${DUR}s" begin="${begin}" fill="freeze"/>
  </text>`;
    }).join('\n');

    return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <defs>
    <linearGradient id="boardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="${cfg.boardColor0}"/>
      <stop offset="0.65" stop-color="${cfg.boardColor1}"/>
      <stop offset="1"    stop-color="${cfg.boardColor2}"/>
    </linearGradient>
    <filter id="boardNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="8" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0.25"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.04 0.06"/></feComponentTransfer>
    </filter>
    <filter id="chalk" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" seed="11" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.25"/>
    </filter>
    <linearGradient id="chalkColor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${cfg.textColor}"/>
      <stop offset="1" stop-color="${cfg.textColor}"/>
    </linearGradient>
    <style><![CDATA[
      .chalkText {
        fill: url(#chalkColor);
        font-family: ${cfg.fontFamily};
        font-weight: 700;
        letter-spacing: 0.02em;
        filter: url(#chalk);
        paint-order: stroke fill;
        stroke: ${cfg.textColor};
        stroke-width: 0.2px;
        font-size: ${FONT_SIZE}px;
      }
    ]]></style>
  </defs>
  <rect width="${W}" height="${H}" fill="url(#boardGrad)"/>
  <rect width="${W}" height="${H}" fill="#000" opacity="0.22" filter="url(#boardNoise)"/>
${textElems}
</svg>`;
  }

  function generate() {
    const text = document.getElementById('textInput').value;
    setStatus('生成中…');

    // 重い処理をrAFで1フレーム遅延させUIをブロックしない
    requestAnimationFrame(() => {
      try {
        lastSvg = buildSvg(text);
        document.getElementById('preview').innerHTML = lastSvg;
        document.getElementById('dlBtn').disabled = false;
        scalePreview();
        setStatus('生成完了 ✅');
      } catch(err) {
        setStatus('エラー: ' + err.message);
        console.error(err);
      }
    });
  }

  function download() {
    if (!lastSvg) return;
    setStatus('ダウンロード準備中…');

    // setTimeout で UI スレッドを解放してからダウンロード
    setTimeout(() => {
      try {
        const blob = new Blob([lastSvg], { type: 'image/svg+xml;charset=utf-8' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `chalkboard_${Date.now()}.svg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        // revokeは少し遅延させる（即時revoke→フリーズの防止）
        setTimeout(() => URL.revokeObjectURL(url), 3000);
        setStatus('ダウンロード開始 💾');
      } catch(err) {
        setStatus('ダウンロードエラー: ' + err.message);
        console.error(err);
      }
    }, 50);
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  document.getElementById('genBtn').onclick = generate;
  document.getElementById('dlBtn').onclick  = download;
  window.addEventListener('resize', scalePreview);
</script>
</body>
</html>
