<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>設定（左）</title>
  <link rel="stylesheet" href="../../01-css/31-csv-05-kkbn.css">
</head>
<body class="navi">

<h3>⚙ 黒板設定</h3>

<!-- フォントサイズ -->
<div class="section">
  <div class="row">
    <label>文字サイズ</label>
    <span class="val" id="fontSizeVal">24</span>px
  </div>
  <input type="range" id="fontSize" min="12" max="72" value="24">
</div>

<!-- 余白 -->
<div class="section">
  <div class="row">
    <label>左余白 (marginX)</label>
    <span class="val" id="marginXVal">40</span>
  </div>
  <input type="range" id="marginX" min="0" max="300" value="40">

  <div class="row" style="margin-top:6px">
    <label>上余白 (marginY)</label>
    <span class="val" id="marginYVal">60</span>
  </div>
  <input type="range" id="marginY" min="0" max="300" value="60">
</div>

<!-- 黒板色 -->
<div class="color-section">
  <label style="margin-bottom:6px; display:block;">黒板の色</label>

  <!-- プリセット -->
  <div class="preset-row" id="presetRow"></div>

  <!-- カスタム -->
  <div class="color-row">
    <label>グラデ①（左上）</label>
    <input type="color" id="boardColor0" value="#173628">
    <input class="hex-input" id="boardColor0Hex" value="#173628">
  </div>
  <div class="color-row">
    <label>グラデ②（中央）</label>
    <input type="color" id="boardColor1" value="#1b402d">
    <input class="hex-input" id="boardColor1Hex" value="#1b402d">
  </div>
  <div class="color-row">
    <label>グラデ③（右下）</label>
    <input type="color" id="boardColor2" value="#123021">
    <input class="hex-input" id="boardColor2Hex" value="#123021">
  </div>
</div>

<button id="applyBtn">▶ 適用して生成</button>

<script>
  // ── プリセット定義 ──────────────────────────
  const PRESETS = [
    { label: '緑（黒板）',  c0:'#173628', c1:'#1b402d', c2:'#123021' },
    { label: '濃緑',        c0:'#0d2a1a', c1:'#0f3320', c2:'#081c10' },
    { label: '黒',          c0:'#1a1a1a', c1:'#222222', c2:'#111111' },
    { label: '紺',          c0:'#0d1b2a', c1:'#1a2f45', c2:'#09131e' },
    { label: '茶',          c0:'#2a1a0a', c1:'#3a2410', c2:'#1a0f05' },
    { label: '赤紫',        c0:'#2a0a1a', c1:'#3d1228', c2:'#1a0510' },
  ];

  // プリセットボタンを動的生成
  const presetRow = document.getElementById('presetRow');
  PRESETS.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.title = p.label;
    btn.style.background = p.c1;
    if (i === 0) btn.classList.add('active');
    btn.addEventListener('click', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      setColor('boardColor0', p.c0);
      setColor('boardColor1', p.c1);
      setColor('boardColor2', p.c2);
    });
    presetRow.appendChild(btn);
  });

  // ── カラーピッカー↔HEX入力の同期 ──────────
  ['boardColor0','boardColor1','boardColor2'].forEach(id => {
    const picker = document.getElementById(id);
    const hex    = document.getElementById(id + 'Hex');
    picker.addEventListener('input', () => { hex.value = picker.value; });
    hex.addEventListener('change', () => {
      if (/^#[0-9a-fA-F]{6}$/.test(hex.value)) picker.value = hex.value;
    });
  });

  function setColor(id, val) {
    document.getElementById(id).value = val;
    document.getElementById(id + 'Hex').value = val;
  }

  // ── スライダー表示値の更新 ──────────────────
  function bindRange(id, valId) {
    const el  = document.getElementById(id);
    const out = document.getElementById(valId);
    el.addEventListener('input', () => out.textContent = el.value);
  }
  bindRange('fontSize', 'fontSizeVal');
  bindRange('marginX',  'marginXVal');
  bindRange('marginY',  'marginYVal');

  // ── 適用ボタン → index.html へ postMessage ──
  document.getElementById('applyBtn').addEventListener('click', () => {
    const cfg = {
      fontSize:    Number(document.getElementById('fontSize').value),
      marginX:     Number(document.getElementById('marginX').value),
      marginY:     Number(document.getElementById('marginY').value),
      boardColor0: document.getElementById('boardColor0').value,
      boardColor1: document.getElementById('boardColor1').value,
      boardColor2: document.getElementById('boardColor2').value,
    };
    if (parent && parent.frames && parent.frames['center']) {
      parent.frames['center'].postMessage({ type: 'kkbnCfg', cfg }, '*');
    }
  });
</script>
</body>
</html>
