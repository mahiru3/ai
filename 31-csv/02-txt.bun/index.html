<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG手書き → 上下分割 → ②が浮かび上がる</title>
  <link rel="stylesheet" href="../../01-css/00-style.css">
  <link rel="stylesheet" href="../../01-css/31-csv-02-txt.bun.css">
</head>
<body>

<fieldset>
  <legend>① 手書きテキスト</legend>
  <div class="input-preview-row">
    <input id="text1" type="text" value="Call of Cthulhu">
    <span id="prev1" class="text-preview"></span>
  </div>
</fieldset>

<fieldset>
  <legend>② 浮かび上がるテキスト</legend>
  <div class="input-preview-row">
    <input id="text2" type="text" value="Welcome to the Mythos">
    <span id="prev2" class="text-preview"></span>
  </div>
</fieldset>

<div class="actions">
  <button class="svg-btn" id="build">SVGを生成</button>
  <button class="svg-btn" id="copy">SVGをコピー</button>
  <button class="svg-btn" id="download">SVGをダウンロード</button>
</div>

<fieldset>
  <legend>プレビュー（768×432）</legend>
  <div class="preview" id="previewArea">ここにSVGが表示されます</div>
</fieldset>

<fieldset>
  <legend>生成SVGコード</legend>
  <textarea id="code" readonly></textarea>
</fieldset>

<script>
  let cfg = {
    color1:'#000000', size1:72,   font1sel:'serif', font1free:'', letter1:2,   baseDur1:0.75, splitDur:1.2,
    color2:'#000000', size2:56,   font2sel:'serif', font2free:'', letter2:1,   riseDur:0.9,   afterDelay:0.2
  };

  window.addEventListener('message', e => {
    if (e.data && e.data.type === 'svgCfg') {
      cfg = Object.assign(cfg, e.data.cfg);
      updatePreviews();
      buildSVG();
    }
  });

  // テキスト入力のリアルタイムプレビュー更新
  function updatePreviews() {
    const f1 = (cfg.font1free || '').trim() || cfg.font1sel;
    const f2 = (cfg.font2free || '').trim() || cfg.font2sel;
    const p1 = document.getElementById('prev1');
    const p2 = document.getElementById('prev2');
    p1.textContent = document.getElementById('text1').value;
    p1.style.fontFamily = f1;
    p1.style.fontSize   = Math.min(Number(cfg.size1), 48) + 'px';
    p1.style.color      = cfg.color1;
    p2.textContent = document.getElementById('text2').value;
    p2.style.fontFamily = f2;
    p2.style.fontSize   = Math.min(Number(cfg.size2), 40) + 'px';
    p2.style.color      = cfg.color2;
  }

  document.getElementById('text1').addEventListener('input', updatePreviews);
  document.getElementById('text2').addEventListener('input', updatePreviews);

  const meas = document.createElement('canvas').getContext('2d');
  function widthOf(ch, size, family) { meas.font = `${size}px ${family}`; return meas.measureText(ch).width; }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function buildSVG() {
    const t1  = document.getElementById('text1').value || '';
    const t2  = document.getElementById('text2').value || '';
    const c1  = cfg.color1;
    const s1  = Math.max(8, Number(cfg.size1));
    const f1  = (cfg.font1free || '').trim() || cfg.font1sel;
    const ls1 = Number(cfg.letter1);
    const bd1 = Math.max(0.05, Number(cfg.baseDur1));
    const spD = Math.max(0.1,  Number(cfg.splitDur));
    const c2  = cfg.color2;
    const s2  = Math.max(8, Number(cfg.size2));
    const f2  = (cfg.font2free || '').trim() || cfg.font2sel;
    const ls2 = Number(cfg.letter2);
    const rD  = Math.max(0.1, Number(cfg.riseDur));
    const aD  = Math.max(0,   Number(cfg.afterDelay));

    const W = 768, H = 432;
    const baseY1 = Math.round(H/2) + Math.round(s1*0.35);
    const baseY2 = Math.round(H/2) + Math.round(s2*0.35);

    const ch1  = [...t1];
    const w1   = ch1.map(ch => widthOf(ch, s1, f1));
    const tot1 = w1.reduce((a,b)=>a+b, 0) + Math.max(0, ch1.length-1)*ls1;
    let x1 = (W - tot1) / 2;

    const ch2  = [...t2];
    const w2   = ch2.map(ch => widthOf(ch, s2, f2));
    const tot2 = w2.reduce((a,b)=>a+b, 0) + Math.max(0, ch2.length-1)*ls2;
    let x2 = (W - tot2) / 2;

    const strokeW = Math.max(8, s1*0.38);
    const dashFor = w => Math.max(300, w*12);
    const durFor  = w => (bd1 * Math.max(0.5, Math.min(1.6, w/(s1*0.6)))).toFixed(3) + 's';

    let begin = '0s', id = 0;
    const maskDefs = [], traceTexts = [], fillTextsA = [];

    ch1.forEach((ch, i) => {
      const w = w1[i];
      if (ch === ' ') { x1 += w + ls1; return; }
      const aid  = `a${++id}`;
      const dash = Math.round(dashFor(w));
      const dur  = durFor(w);
      const mx   = Math.round(x1);
      maskDefs.push(
        `<mask id="m${id}"><text x="${mx}" y="${baseY1}" font-family="${f1}" font-size="${s1}" fill="none" stroke="#fff" stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="${dash}" stroke-dashoffset="${dash}">${esc(ch)}<animate attributeName="stroke-dashoffset" from="${dash}" to="0" dur="${dur}" begin="${begin}" fill="freeze"/></text></mask>`
      );
      traceTexts.push(
        `<text x="${mx}" y="${baseY1}" font-family="${f1}" font-size="${s1}" fill="none" stroke="${c1}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="${dash}" stroke-dashoffset="${dash}">${esc(ch)}<animate id="${aid}" attributeName="stroke-dashoffset" from="${dash}" to="0" dur="${dur}" begin="${begin}" fill="freeze"/></text>`
      );
      fillTextsA.push(
        `<text x="${mx}" y="${baseY1}" font-family="${f1}" font-size="${s1}" fill="${c1}" mask="url(#m${id})">${esc(ch)}</text>`
      );
      begin = `${aid}.end+0.08s`;
      x1 += w + ls1;
    });

    const lastId      = id ? `a${id}` : null;
    const beginBottom = lastId ? `${lastId}.end+0.05s` : '0s';
    const beginTop    = lastId ? `${lastId}.end+0.06s` : '0s';
    const halfY       = H / 2;

    const fillTextsB = [];
    ch2.forEach((ch, i) => {
      const mx = Math.round(x2);
      fillTextsB.push(`<text x="${mx}" y="${baseY2}" font-family="${f2}" font-size="${s2}" fill="${c2}">${esc(ch)}</text>`);
      x2 += w2[i] + ls2;
    });

    const svg =
`<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <defs>
    ${maskDefs.join('\n    ')}
    <mask id="maskTop"><rect x="0" y="0" width="${W}" height="${halfY}" fill="#fff"/></mask>
    <mask id="maskBottom"><rect x="0" y="${halfY}" width="${W}" height="${halfY}" fill="#fff"/></mask>
    <symbol id="glyphsA" viewBox="0 0 ${W} ${H}">${fillTextsA.join('')}</symbol>
    <symbol id="glyphsB" viewBox="0 0 ${W} ${H}">${fillTextsB.join('')}</symbol>
  </defs>
  <g id="traceA">
    ${traceTexts.join('\n    ')}
    ${lastId ? `<animate attributeName="opacity" from="1" to="0" dur="0.1s" begin="${lastId}.end+0.01s" fill="freeze"/>` : ''}
  </g>
  <use id="layerBottomA" href="#glyphsA" xlink:href="#glyphsA">
    ${lastId ? `<set attributeName="display" to="none" begin="${beginBottom}"/>` : ''}
  </use>
  <use id="layerTopA_Up" href="#glyphsA" xlink:href="#glyphsA" mask="url(#maskTop)">
    ${lastId ? `<animateTransform id="splitMove" attributeName="transform" type="translate" from="0 0" to="200 0" dur="${spD}s" begin="${beginTop}" fill="freeze"/>` : ''}
    ${lastId ? `<animate attributeName="opacity" from="1" to="0" dur="${spD}s" begin="${beginTop}" fill="freeze"/>` : ''}
  </use>
  <use id="layerTopA_Down" href="#glyphsA" xlink:href="#glyphsA" mask="url(#maskBottom)">
    ${lastId ? `<animateTransform attributeName="transform" type="translate" from="0 0" to="-200 0" dur="${spD}s" begin="${beginTop}" fill="freeze"/>` : ''}
    ${lastId ? `<animate attributeName="opacity" from="1" to="0" dur="${spD}s" begin="${beginTop}" fill="freeze"/>` : ''}
  </use>
  <use id="textB" href="#glyphsB" xlink:href="#glyphsB" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="${rD}s" begin="splitMove.end+${aD}s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 12" to="0 0" dur="${rD}s" begin="splitMove.end+${aD}s" fill="freeze"/>
  </use>
</svg>`;

    document.getElementById('code').value = svg;
    document.getElementById('previewArea').innerHTML = svg;
  }

  document.getElementById('build').addEventListener('click', e => { e.preventDefault(); buildSVG(); });
  document.getElementById('copy').addEventListener('click', e => {
    e.preventDefault();
    const t = document.getElementById('code');
    t.select(); t.setSelectionRange(0, 999999);
    document.execCommand('copy');
  });
  document.getElementById('download').addEventListener('click', e => {
    e.preventDefault();
    const svg  = document.getElementById('code').value || '';
    const blob = new Blob([svg], { type:'image/svg+xml;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'handwrite_two_stage.svg';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  });

  updatePreviews();
  buildSVG();
</script>
</body>
</html>
