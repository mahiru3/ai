<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>設定（左）</title>
  <link rel="stylesheet" href="../../01-css/00-style.css">
  <link rel="stylesheet" href="../../01-css/31-csv-02-txt.bun.css">
</head>
<body class="navi">

<button id="applyBtn">▶ 設定を反映</button>

<section>
  <b>① 手書きテキスト</b>

  <label>色①</label>
  <div class="color-row">
    <input type="color" id="color1picker" value="#000000">
    <input type="text"  id="color1hex"    value="#000000" class="hex-input">
  </div>

  <label>サイズ①（px）: <span id="size1val">72</span></label>
  <input id="size1" type="range" min="8" max="120" value="72" oninput="upd('size1val',this.value); sendCfg();">

  <label>フォント①</label>
  <select id="font1sel" onchange="sendCfg()">
    <option value="serif"                        style="font-family:serif"                         selected>serif（明朝系）</option>
    <option value="sans-serif"                   style="font-family:sans-serif"                   >sans-serif（ゴシック系）</option>
    <option value="monospace"                    style="font-family:monospace"                    >monospace（等幅）</option>
    <option value="Georgia, serif"               style="font-family:Georgia,serif"                >Georgia</option>
    <option value="Times New Roman, serif"       style="font-family:'Times New Roman',serif"      >Times New Roman</option>
    <option value="Garamond, serif"              style="font-family:Garamond,serif"               >Garamond</option>
    <option value="Palatino, serif"              style="font-family:Palatino,serif"               >Palatino</option>
    <option value="Arial, Helvetica, sans-serif" style="font-family:Arial,Helvetica,sans-serif"   >Arial</option>
    <option value="Verdana, sans-serif"          style="font-family:Verdana,sans-serif"           >Verdana</option>
    <option value="Tahoma, sans-serif"           style="font-family:Tahoma,sans-serif"            >Tahoma</option>
    <option value="Trebuchet MS, sans-serif"     style="font-family:'Trebuchet MS',sans-serif"    >Trebuchet MS</option>
    <option value="Impact, sans-serif"           style="font-family:Impact,sans-serif"            >Impact</option>
    <option value="Courier New, monospace"       style="font-family:'Courier New',monospace"      >Courier New</option>
    <option value="Noto Sans JP, sans-serif"     style="font-family:'Noto Sans JP',sans-serif"    >Noto Sans JP</option>
  </select>

  <label>任意フォント①（空なら上を使用）</label>
  <input id="font1free" type="text" placeholder="例）'Yu Mincho',serif" oninput="sendCfg()">

  <label>文字間①（px）: <span id="letter1val">2</span></label>
  <input id="letter1" type="range" min="-10" max="40" value="2" step="0.5" oninput="upd('letter1val',this.value); sendCfg();">

  <label>基準描画秒①（s）: <span id="baseDur1val">0.75</span></label>
  <input id="baseDur1" type="range" min="0.05" max="3" value="0.75" step="0.05" oninput="upd('baseDur1val',this.value); sendCfg();">
  <div class="hint">大きいほどゆっくり</div>

  <label>上下分割・消滅（s）: <span id="splitDurval">1.2</span></label>
  <input id="splitDur" type="range" min="0.1" max="5" value="1.2" step="0.1" oninput="upd('splitDurval',this.value); sendCfg();">
</section>

<section>
  <b>② 浮かび上がるテキスト</b>

  <label>色②</label>
  <div class="color-row">
    <input type="color" id="color2picker" value="#000000">
    <input type="text"  id="color2hex"    value="#000000" class="hex-input">
  </div>

  <label>サイズ②（px）: <span id="size2val">56</span></label>
  <input id="size2" type="range" min="8" max="120" value="56" oninput="upd('size2val',this.value); sendCfg();">

  <label>フォント②</label>
  <select id="font2sel" onchange="sendCfg()">
    <option value="serif"                        style="font-family:serif"                         selected>serif（明朝系）</option>
    <option value="sans-serif"                   style="font-family:sans-serif"                   >sans-serif（ゴシック系）</option>
    <option value="monospace"                    style="font-family:monospace"                    >monospace（等幅）</option>
    <option value="Georgia, serif"               style="font-family:Georgia,serif"                >Georgia</option>
    <option value="Times New Roman, serif"       style="font-family:'Times New Roman',serif"      >Times New Roman</option>
    <option value="Garamond, serif"              style="font-family:Garamond,serif"               >Garamond</option>
    <option value="Palatino, serif"              style="font-family:Palatino,serif"               >Palatino</option>
    <option value="Arial, Helvetica, sans-serif" style="font-family:Arial,Helvetica,sans-serif"   >Arial</option>
    <option value="Verdana, sans-serif"          style="font-family:Verdana,sans-serif"           >Verdana</option>
    <option value="Tahoma, sans-serif"           style="font-family:Tahoma,sans-serif"            >Tahoma</option>
    <option value="Trebuchet MS, sans-serif"     style="font-family:'Trebuchet MS',sans-serif"    >Trebuchet MS</option>
    <option value="Impact, sans-serif"           style="font-family:Impact,sans-serif"            >Impact</option>
    <option value="Courier New, monospace"       style="font-family:'Courier New',monospace"      >Courier New</option>
    <option value="Noto Sans JP, sans-serif"     style="font-family:'Noto Sans JP',sans-serif"    >Noto Sans JP</option>
  </select>

  <label>任意フォント②（空なら上を使用）</label>
  <input id="font2free" type="text" placeholder="例）'Yu Gothic',sans-serif" oninput="sendCfg()">

  <label>文字間②（px）: <span id="letter2val">1</span></label>
  <input id="letter2" type="range" min="-10" max="40" value="1" step="0.5" oninput="upd('letter2val',this.value); sendCfg();">

  <label>浮かび上がり秒数②（s）: <span id="riseDurval">0.9</span></label>
  <input id="riseDur" type="range" min="0.1" max="5" value="0.9" step="0.1" oninput="upd('riseDurval',this.value); sendCfg();">

  <label>出現までの待ち秒（s）: <span id="afterDelayval">0.2</span></label>
  <input id="afterDelay" type="range" min="0" max="5" value="0.2" step="0.05" oninput="upd('afterDelayval',this.value); sendCfg();">
</section>

<h3>設定パネル</h3>

<script>
  function upd(id, val) {
    document.getElementById(id).textContent = val;
  }

  function bindColor(pickerId, hexId) {
    const picker = document.getElementById(pickerId);
    const hex    = document.getElementById(hexId);
    picker.addEventListener('input', () => { hex.value = picker.value.toUpperCase(); sendCfg(); });
    hex.addEventListener('input', () => {
      if (/^#[0-9A-Fa-f]{6}$/.test(hex.value)) { picker.value = hex.value; sendCfg(); }
    });
  }
  bindColor('color1picker', 'color1hex');
  bindColor('color2picker', 'color2hex');

  function getCfg() {
    return {
      color1:     document.getElementById('color1hex').value,
      size1:      Number(document.getElementById('size1').value),
      font1sel:   document.getElementById('font1sel').value,
      font1free:  document.getElementById('font1free').value,
      letter1:    Number(document.getElementById('letter1').value),
      baseDur1:   Number(document.getElementById('baseDur1').value),
      splitDur:   Number(document.getElementById('splitDur').value),
      color2:     document.getElementById('color2hex').value,
      size2:      Number(document.getElementById('size2').value),
      font2sel:   document.getElementById('font2sel').value,
      font2free:  document.getElementById('font2free').value,
      letter2:    Number(document.getElementById('letter2').value),
      riseDur:    Number(document.getElementById('riseDur').value),
      afterDelay: Number(document.getElementById('afterDelay').value),
    };
  }

  function sendCfg() {
    const center = parent && parent.frames && parent.frames['center'];
    if (center) center.postMessage({ type: 'svgCfg', cfg: getCfg() }, '*');
  }

  document.getElementById('applyBtn').addEventListener('click', sendCfg);
</script>
</body>
</html>
